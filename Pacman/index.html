<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Pac-Man</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#000;color:#fff;
    font-family:'Courier New',monospace;overflow:hidden;touch-action:none;
    display:flex;flex-direction:column;align-items:center;justify-content:center}
  canvas{max-width:100vw;max-height:94vh;display:block}
  #hint{color:#777;font-size:12px;margin-top:6px;text-align:center;user-select:none}
</style>
</head>
<body>
<canvas id="cv" width="560" height="704"></canvas>
<div id="hint">Flèches ou WASD : déplacer &nbsp;—&nbsp; P : pause &nbsp;—&nbsp; M : son &nbsp;—&nbsp; mobile : glisser le doigt</div>
<script>
'use strict';

// ---------- Constantes ----------
const T = 20, H = 10, COLS = 28, ROWS = 31, TOP = 48, W = COLS * T;
const UP = 0, LEFT = 1, DOWN = 2, RIGHT = 3;
const DIRS = [{x:0,y:-1},{x:-1,y:0},{x:0,y:1},{x:1,y:0}];

const RAW = [
"############################",
"#............##............#",
"#.####.#####.##.#####.####.#",
"#o####.#####.##.#####.####o#",
"#.####.#####.##.#####.####.#",
"#..........................#",
"#.####.##.########.##.####.#",
"#.####.##.########.##.####.#",
"#......##....##....##......#",
"######.##### ## #####.######",
"     #.##### ## #####.#     ",
"     #.##          ##.#     ",
"     #.## ###==### ##.#     ",
"######.## #      # ##.######",
"      .   #      #   .      ",
"######.## #      # ##.######",
"     #.## ######## ##.#     ",
"     #.##          ##.#     ",
"     #.## ######## ##.#     ",
"######.## ######## ##.######",
"#............##............#",
"#.####.#####.##.#####.####.#",
"#.####.#####.##.#####.####.#",
"#o..##.......  .......##..o#",
"###.##.##.########.##.##.###",
"###.##.##.########.##.##.###",
"#......##....##....##......#",
"#.##########.##.##########.#",
"#.##########.##.##########.#",
"#..........................#",
"############################",
];

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// ---------- État global ----------
let grid, dotsLeft, dotsEaten;
let score = 0, hi = +(localStorage.getItem('pacman-hi') || 0);
let lives = 3, level = 1;
let state = 'title';     // title | ready | play | dying | clear | over
let stateT = 0, paused = false, muted = false, extraGiven = false;
let mode = 'scatter', modeIdx = 0, modeT = 0;
let frightT = 0, chain = 200;
let fruit = null;        // {t}
let popups = [];         // {x,y,t,txt}
let wallsBlue, wallsWhite;

const MODES = [[7,'scatter'],[20,'chase'],[7,'scatter'],[20,'chase'],
               [5,'scatter'],[20,'chase'],[5,'scatter'],[1e9,'chase']];

// ---------- Audio ----------
let AC = null;
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(f0, f1, dur, type, vol, delay) {
  if (muted) return;
  const a = audio(); if (!a) return;
  try {
    const t = a.currentTime + (delay || 0);
    const o = a.createOscillator(), g = a.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(f0, t);
    if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + dur);
    g.gain.setValueAtTime(vol || 0.07, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(a.destination);
    o.start(t); o.stop(t + dur + 0.05);
  } catch(e){}
}
let wakaHi = false;
function sWaka()    { tone(wakaHi ? 520 : 420, wakaHi ? 280 : 200, 0.07, 'square', 0.05); wakaHi = !wakaHi; }
function sPower()   { tone(160, 420, 0.4, 'sawtooth', 0.06); }
function sGhost()   { tone(300, 950, 0.3, 'square', 0.09); }
function sDeath()   { tone(650, 70, 1.1, 'sawtooth', 0.1); }
function sFruit()   { tone(950, 1500, 0.18, 'square', 0.08); }
function sExtra()   { tone(880, 880, 0.12, 'square', 0.09); tone(1320, 1320, 0.18, 'square', 0.09, 0.13); }
function sClear()   { [440, 554, 659, 880].forEach((f, i) => tone(f, f, 0.16, 'square', 0.08, i * 0.13)); }

// ---------- Labyrinthe ----------
function buildLevel() {
  grid = RAW.map(r => r.split(''));
  dotsLeft = 0; dotsEaten = 0; fruit = null;
  for (const row of grid) for (const c of row) if (c === '.' || c === 'o') dotsLeft++;
}
function walkable(x, y, allowDoor) {
  if (y === 14 && (x < 0 || x >= COLS)) return true;   // tunnel
  if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return false;
  const c = grid[y][x];
  return c !== '#' && (allowDoor || c !== '=');
}
function renderWalls(color) {
  const c = document.createElement('canvas');
  c.width = W; c.height = ROWS * T;
  const g = c.getContext('2d');
  g.strokeStyle = color; g.lineWidth = 3.5; g.lineCap = 'round';
  const isWall = (x, y) => x >= 0 && x < COLS && y >= 0 && y < ROWS && RAW[y][x] === '#';
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
    if (RAW[y][x] !== '#') continue;
    const cx = x * T + H, cy = y * T + H;
    let linked = false;
    if (isWall(x + 1, y)) { g.beginPath(); g.moveTo(cx, cy); g.lineTo(cx + T, cy); g.stroke(); linked = true; }
    if (isWall(x, y + 1)) { g.beginPath(); g.moveTo(cx, cy); g.lineTo(cx, cy + T); g.stroke(); linked = true; }
    if (!linked && !isWall(x - 1, y) && !isWall(x, y - 1)) { g.fillStyle = color; g.fillRect(cx - 2.5, cy - 2.5, 5, 5); }
  }
  // porte de la maison des fantômes
  g.strokeStyle = '#ffb8de'; g.lineWidth = 4;
  g.beginPath(); g.moveTo(13 * T, 12 * T + H); g.lineTo(15 * T, 12 * T + H); g.stroke();
  return c;
}
wallsBlue  = renderWalls('#2333d6');
wallsWhite = renderWalls('#f3f3ff');

// ---------- Entités ----------
const pac = { x: 0, y: 0, dir: LEFT, next: LEFT };
function mkGhost(name, color, corner, homeX, rel) {
  return { name, color, corner, homeX, rel0: rel, x: 0, y: 0, dir: LEFT, state: 'house', rel: rel, bob: 0 };
}
const ghosts = [
  mkGhost('blinky', '#ff2121', {x:26, y:1},  270, 0),
  mkGhost('pinky',  '#ffb8de', {x:1,  y:1},  270, 1.5),
  mkGhost('inky',   '#21ffff', {x:26, y:29}, 230, 4),
  mkGhost('clyde',  '#ffb847', {x:1,  y:29}, 310, 7),
];

function resetActors() {
  pac.x = 270; pac.y = 23 * T + H; pac.dir = LEFT; pac.next = LEFT;
  for (const g of ghosts) {
    g.dir = LEFT; g.bob = 0; g.rel = g.rel0;
    if (g.name === 'blinky') { g.x = 270; g.y = 11 * T + H; g.state = 'normal'; }
    else { g.x = g.homeX; g.y = 14 * T + H; g.state = 'house'; }
  }
  mode = 'scatter'; modeIdx = 0; modeT = 0; frightT = 0; chain = 200;
  popups = [];
}
function newGame() {
  score = 0; lives = 3; level = 1; extraGiven = false;
  buildLevel(); resetActors();
  state = 'ready'; stateT = 0;
}

// ---------- Déplacement ----------
function entityStep(e, dist, decide, allowDoor) {
  let guard = 0;
  while (dist > 0.001 && guard++ < 80) {
    const tx = Math.floor(e.x / T), ty = Math.floor(e.y / T);
    const cx = tx * T + H, cy = ty * T + H;
    if (Math.abs(e.x - cx) < 0.01 && Math.abs(e.y - cy) < 0.01) {
      e.x = cx; e.y = cy;
      decide(e);
      if (e.dir == null) return;
      const d = DIRS[e.dir];
      if (!walkable(tx + d.x, ty + d.y, allowDoor)) { e.dir = null; return; }
    }
    if (e.dir == null) return;
    const d = DIRS[e.dir];
    let cur, nc;
    if (d.x !== 0) {
      cur = e.x;
      nc = d.x > 0 ? (Math.floor((e.x - H) / T + 1e-6) + 1) * T + H
                   : (Math.ceil((e.x - H) / T - 1e-6) - 1) * T + H;
    } else {
      cur = e.y;
      nc = d.y > 0 ? (Math.floor((e.y - H) / T + 1e-6) + 1) * T + H
                   : (Math.ceil((e.y - H) / T - 1e-6) - 1) * T + H;
    }
    const d2c = Math.abs(nc - cur);
    const step = Math.min(dist, d2c);
    if (d.x !== 0) e.x += d.x * step; else e.y += d.y * step;
    if (step >= d2c - 0.0001) { if (d.x !== 0) e.x = nc; else e.y = nc; }
    dist -= step;
    if (e.x < -H) e.x += W + T; else if (e.x > W + H) e.x -= W + T;
  }
}

function pacDecide(e) {
  const tx = Math.floor(e.x / T), ty = Math.floor(e.y / T);
  if (tx < 0 || tx >= COLS) return;
  if (e.next != null) {
    const d = DIRS[e.next];
    if (walkable(tx + d.x, ty + d.y, false)) e.dir = e.next;
  }
}

function ghostTarget(g) {
  const pt = { x: Math.floor(pac.x / T), y: Math.floor(pac.y / T) };
  const pd = pac.dir != null ? DIRS[pac.dir] : {x:0, y:0};
  if (mode === 'scatter') return g.corner;
  switch (g.name) {
    case 'blinky': return pt;
    case 'pinky':  return { x: pt.x + 4 * pd.x, y: pt.y + 4 * pd.y };
    case 'inky': {
      const b = ghosts[0];
      const ax = pt.x + 2 * pd.x, ay = pt.y + 2 * pd.y;
      return { x: 2 * ax - Math.floor(b.x / T), y: 2 * ay - Math.floor(b.y / T) };
    }
    case 'clyde': {
      const gx = Math.floor(g.x / T), gy = Math.floor(g.y / T);
      const d2 = (gx - pt.x) ** 2 + (gy - pt.y) ** 2;
      return d2 > 64 ? pt : g.corner;
    }
  }
}

function ghostDecide(g) {
  const tx = Math.floor(g.x / T), ty = Math.floor(g.y / T);
  if (tx < 0 || tx >= COLS) return;
  if (g.state === 'eyes' && tx === 13 && ty === 11) { g.state = 'enter'; g.dir = null; return; }
  const opts = [];
  for (let i = 0; i < 4; i++) {
    if (g.dir != null && i === (g.dir + 2) % 4) continue;
    const d = DIRS[i];
    if (walkable(tx + d.x, ty + d.y, g.state === 'eyes')) opts.push(i);
  }
  if (!opts.length) { if (g.dir != null) g.dir = (g.dir + 2) % 4; return; }
  if (g.state === 'fright') { g.dir = opts[(Math.random() * opts.length) | 0]; return; }
  const target = g.state === 'eyes' ? { x: 13, y: 11 } : ghostTarget(g);
  let best = opts[0], bd = Infinity;
  for (const o of opts) {
    const d = DIRS[o];
    const v = (tx + d.x - target.x) ** 2 + (ty + d.y - target.y) ** 2;
    if (v < bd) { bd = v; best = o; }
  }
  g.dir = best;
}

// ---------- Logique de jeu ----------
function addScore(n) {
  score += n;
  if (score > hi) hi = score;
  if (!extraGiven && score >= 10000) { extraGiven = true; lives++; sExtra(); popup(pac.x, pac.y, '1UP'); }
}
function popup(x, y, txt) { popups.push({ x, y, t: 1, txt }); }

function frighten() {
  frightT = Math.max(2, 7 - (level - 1) * 0.7);
  chain = 200;
  sPower();
  for (const g of ghosts) {
    if (g.state === 'normal' || g.state === 'fright') {
      g.state = 'fright';
      if (g.dir != null) g.dir = (g.dir + 2) % 4;
    }
  }
}

function ghostUpdate(g, dt) {
  if (g.state === 'house') {
    g.rel -= dt; g.bob += dt;
    g.y = 14 * T + H + Math.sin(g.bob * 5) * 3;
    if (g.rel <= 0) g.state = 'leave';
    return;
  }
  if (g.state === 'leave') {
    const s = 60 * dt;
    if (Math.abs(g.x - 270) > 0.5) {
      g.x += Math.sign(270 - g.x) * Math.min(s, Math.abs(270 - g.x));
    } else {
      g.x = 270; g.y -= s;
      if (g.y <= 11 * T + H) {
        g.y = 11 * T + H;
        g.state = frightT > 0 ? 'fright' : 'normal';
        g.dir = LEFT;
      }
    }
    return;
  }
  if (g.state === 'enter') {
    g.x = 270; g.y += 200 * dt;
    if (g.y >= 14 * T + H) { g.y = 14 * T + H; g.state = 'house'; g.rel = 0.8; g.bob = 0; }
    return;
  }
  let sp;
  if (g.state === 'eyes') sp = 260;
  else if (g.state === 'fright') sp = 58;
  else sp = 95 * Math.min(1.45, 1 + (level - 1) * 0.06);
  const tx = Math.floor(g.x / T), ty = Math.floor(g.y / T);
  if (g.state !== 'eyes' && ty === 14 && (tx < 6 || tx > 21)) sp *= 0.55;
  entityStep(g, sp * dt, ghostDecide, g.state === 'eyes');
}

function updatePlay(dt) {
  // minuteries de mode
  if (frightT > 0) {
    frightT -= dt;
    if (frightT <= 0) {
      frightT = 0;
      for (const g of ghosts) if (g.state === 'fright') g.state = 'normal';
    }
  } else {
    modeT += dt;
    if (modeT >= MODES[modeIdx][0]) {
      modeT = 0; modeIdx = Math.min(modeIdx + 1, MODES.length - 1);
      mode = MODES[modeIdx][1];
      for (const g of ghosts) if ((g.state === 'normal' || g.state === 'fright') && g.dir != null) g.dir = (g.dir + 2) % 4;
    }
  }

  // Pac-Man
  const pSpeed = 120 * Math.min(1.25, 1 + (level - 1) * 0.03);
  entityStep(pac, pSpeed * dt, pacDecide, false);

  // manger
  const ptx = Math.floor(pac.x / T), pty = Math.floor(pac.y / T);
  if (ptx >= 0 && ptx < COLS) {
    const c = grid[pty][ptx];
    if (c === '.') { grid[pty][ptx] = ' '; addScore(10); dotsLeft--; dotsEaten++; sWaka(); }
    else if (c === 'o') { grid[pty][ptx] = ' '; addScore(50); dotsLeft--; dotsEaten++; frighten(); }
  }
  if ((dotsEaten === 70 || dotsEaten === 170) && !fruit) fruit = { t: 9 };
  if (fruit) {
    fruit.t -= dt;
    if (fruit.t <= 0) fruit = null;
    else if (Math.hypot(pac.x - 280, pac.y - (17 * T + H)) < 14) {
      const pts = 100 * level;
      addScore(pts); popup(280, 17 * T + H, '' + pts); sFruit(); fruit = null;
    }
  }

  // fantômes
  for (const g of ghosts) ghostUpdate(g, dt);

  // collisions
  for (const g of ghosts) {
    if (g.state !== 'normal' && g.state !== 'fright') continue;
    if (Math.hypot(g.x - pac.x, g.y - pac.y) < 13) {
      if (g.state === 'fright') {
        addScore(chain); popup(g.x, g.y, '' + chain);
        chain = Math.min(chain * 2, 1600);
        g.state = 'eyes'; sGhost();
      } else {
        state = 'dying'; stateT = 0; sDeath();
        localStorage.setItem('pacman-hi', hi);
        return;
      }
    }
  }

  // niveau terminé
  if (dotsLeft <= 0) {
    state = 'clear'; stateT = 0; sClear();
    localStorage.setItem('pacman-hi', hi);
  }
}

function update(dt) {
  stateT += dt;
  for (const p of popups) p.t -= dt;
  popups = popups.filter(p => p.t > 0);
  switch (state) {
    case 'ready': if (stateT > 2.2) { state = 'play'; stateT = 0; } break;
    case 'play': updatePlay(dt); break;
    case 'dying':
      if (stateT > 1.7) {
        lives--;
        if (lives <= 0) { state = 'over'; stateT = 0; localStorage.setItem('pacman-hi', hi); }
        else { resetActors(); state = 'ready'; stateT = 0; }
      }
      break;
    case 'clear':
      if (stateT > 2.2) { level++; buildLevel(); resetActors(); state = 'ready'; stateT = 0; }
      break;
  }
}

// ---------- Dessin ----------
function drawPac(x, y, dir, open) {
  const ang = [-Math.PI / 2, Math.PI, Math.PI / 2, 0][dir == null ? LEFT : dir];
  ctx.fillStyle = '#ffe11a';
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.arc(x, y, 9.5, ang + open, ang - open + Math.PI * 2);
  ctx.closePath();
  ctx.fill();
}

function drawGhost(g, t) {
  const x = g.x, y = g.y + TOP, r = 9;
  const eyesOnly = g.state === 'eyes' || g.state === 'enter';
  const frightLook = g.state === 'fright' || ((g.state === 'house' || g.state === 'leave') && frightT > 0);
  if (!eyesOnly) {
    let body = g.color;
    if (frightLook) body = (frightT < 2 && Math.floor(t * 5) % 2) ? '#f3f3ff' : '#2121de';
    ctx.fillStyle = body;
    const yb = y + r - 1, fw = (2 * r) / 3;
    ctx.beginPath();
    ctx.moveTo(x - r, yb);
    ctx.lineTo(x - r, y - 2);
    ctx.arc(x, y - 2, r, Math.PI, 0);
    ctx.lineTo(x + r, yb);
    ctx.lineTo(x + r - fw * 0.5, yb - 4);
    ctx.lineTo(x + r - fw,       yb);
    ctx.lineTo(x + r - fw * 1.5, yb - 4);
    ctx.lineTo(x + r - fw * 2,   yb);
    ctx.lineTo(x + r - fw * 2.5, yb - 4);
    ctx.closePath();
    ctx.fill();
  }
  if (frightLook && !eyesOnly) {
    // visage apeuré
    ctx.fillStyle = '#ffb8ae';
    ctx.fillRect(x - 5, y - 4, 2.5, 2.5);
    ctx.fillRect(x + 2.5, y - 4, 2.5, 2.5);
    ctx.strokeStyle = '#ffb8ae'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x - 6, y + 4);
    for (let i = 0; i < 4; i++) {
      ctx.lineTo(x - 6 + (i * 2 + 1) * 1.5, y + 2);
      ctx.lineTo(x - 6 + (i * 2 + 2) * 1.5, y + 4);
    }
    ctx.stroke();
  } else {
    const pd = g.dir != null ? DIRS[g.dir] : {x:0, y:1};
    for (const sx of [-3.5, 3.5]) {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(x + sx, y - 3, 3, 3.6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#1b1bcc';
      ctx.beginPath(); ctx.arc(x + sx + pd.x * 1.7, y - 3 + pd.y * 1.7, 1.7, 0, Math.PI * 2); ctx.fill();
    }
  }
}

function draw(t) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cv.width, cv.height);

  // murs
  const flashWhite = state === 'clear' && Math.floor(stateT * 6) % 2 === 1;
  ctx.drawImage(flashWhite ? wallsWhite : wallsBlue, 0, TOP);

  // pastilles
  if (grid) {
    ctx.fillStyle = '#ffb8ae';
    for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
      const c = grid[y][x];
      if (c === '.') {
        ctx.fillRect(x * T + H - 2, y * T + H + TOP - 2, 4, 4);
      } else if (c === 'o' && Math.floor(t * 4) % 2 === 0) {
        ctx.beginPath(); ctx.arc(x * T + H, y * T + H + TOP, 6, 0, Math.PI * 2); ctx.fill();
      }
    }
  }

  // fruit
  if (fruit) {
    ctx.font = '17px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🍒', 280, 17 * T + H + TOP);
  }

  // Pac-Man
  if (state !== 'over' && state !== 'title' && state !== 'clear') {
    if (state === 'dying') {
      const o = Math.min(Math.PI, (stateT / 1.4) * Math.PI);
      if (o < Math.PI - 0.05) drawPac(pac.x, pac.y + TOP, UP, o);
    } else {
      const open = state === 'play' ? (0.08 + 0.45 * Math.abs(Math.sin(t * 14))) : 0.45;
      drawPac(pac.x, pac.y + TOP, pac.dir, open);
    }
  }

  // fantômes
  if (state === 'play' || state === 'ready' || (state === 'dying' && stateT < 0.3)) {
    for (const g of ghosts) drawGhost(g, t);
  }

  // popups de score
  ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const p of popups) {
    ctx.fillStyle = `rgba(64,255,255,${Math.min(1, p.t)})`;
    ctx.fillText(p.txt, p.x, p.y + TOP - (1 - p.t) * 14);
  }

  // HUD haut
  ctx.fillStyle = '#fff'; ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'left';   ctx.fillText('SCORE ' + score, 12, 30);
  ctx.textAlign = 'center'; ctx.fillText('MEILLEUR ' + hi, 280, 30);
  ctx.textAlign = 'right';  ctx.fillText('NIVEAU ' + level, 548, 30);

  // HUD bas : vies
  const by = TOP + ROWS * T + 18;
  for (let i = 0; i < Math.max(0, lives - 1); i++) drawPac(24 + i * 26, by, LEFT, 0.45);
  if (muted) {
    ctx.fillStyle = '#777'; ctx.font = '13px monospace'; ctx.textAlign = 'right';
    ctx.fillText('SON COUPÉ', 548, by + 4);
  }

  // textes d'état
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const msgY = 17 * T + H + TOP;
  if (state === 'ready') {
    ctx.fillStyle = '#ffe11a'; ctx.font = 'bold 18px monospace';
    ctx.fillText('PRÊT !', 280, msgY);
  } else if (state === 'over') {
    ctx.fillStyle = '#ff2121'; ctx.font = 'bold 20px monospace';
    ctx.fillText('PARTIE TERMINÉE', 280, msgY);
    if (Math.floor(t * 2) % 2 === 0) {
      ctx.fillStyle = '#fff'; ctx.font = '14px monospace';
      ctx.fillText('Entrée ou toucher pour rejouer', 280, msgY + 30);
    }
  } else if (state === 'title') {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, TOP, W, ROWS * T);
    ctx.fillStyle = '#ffe11a'; ctx.font = 'bold 52px monospace';
    ctx.fillText('PAC-MAN', 280, 240);
    const names = [['#ff2121','BLINKY'],['#ffb8de','PINKY'],['#21ffff','INKY'],['#ffb847','CLYDE']];
    ctx.font = 'bold 13px monospace';
    names.forEach((n, i) => {
      ctx.fillStyle = n[0];
      ctx.fillText(n[1], 115 + i * 110, 300);
    });
    if (Math.floor(t * 2) % 2 === 0) {
      ctx.fillStyle = '#fff'; ctx.font = 'bold 16px monospace';
      ctx.fillText('Appuyez sur ENTRÉE ou touchez l’écran', 280, 380);
    }
  }
  if (paused && state === 'play') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, TOP, W, ROWS * T);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 26px monospace';
    ctx.fillText('PAUSE', 280, msgY);
  }
}

// ---------- Entrées ----------
function setDir(d) {
  pac.next = d;
  if (pac.dir != null && d === (pac.dir + 2) % 4) pac.dir = d;
}
function startIfWaiting() {
  audio();
  if (state === 'title' || state === 'over') { newGame(); return true; }
  return false;
}
const KEYMAP = {
  ArrowUp: UP, ArrowLeft: LEFT, ArrowDown: DOWN, ArrowRight: RIGHT,
  w: UP, a: LEFT, s: DOWN, d: RIGHT,
  W: UP, A: LEFT, S: DOWN, D: RIGHT,
  z: UP, q: LEFT, Z: UP, Q: LEFT,
};
window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (e.key === 'Enter' || e.key === ' ') { if (startIfWaiting()) return; }
  if (e.key === 'p' || e.key === 'P') { paused = !paused; return; }
  if (e.key === 'm' || e.key === 'M') { muted = !muted; return; }
  const d = KEYMAP[e.key];
  if (d !== undefined) { audio(); setDir(d); }
});

let touchX = null, touchY = null;
cv.addEventListener('touchstart', e => {
  e.preventDefault();
  touchX = e.touches[0].clientX; touchY = e.touches[0].clientY;
  startIfWaiting();
}, { passive: false });
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touchX == null) return;
  const dx = e.touches[0].clientX - touchX, dy = e.touches[0].clientY - touchY;
  if (Math.abs(dx) > 24 || Math.abs(dy) > 24) {
    setDir(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? RIGHT : LEFT) : (dy > 0 ? DOWN : UP));
    touchX = e.touches[0].clientX; touchY = e.touches[0].clientY;
  }
}, { passive: false });
cv.addEventListener('touchend', () => { touchX = null; });
cv.addEventListener('mousedown', () => startIfWaiting());

document.addEventListener('visibilitychange', () => {
  if (document.hidden && state === 'play') paused = true;
});
window.addEventListener('beforeunload', () => localStorage.setItem('pacman-hi', hi));

// ---------- Boucle ----------
buildLevel();
resetActors();
let last = 0;
function frame(ts) {
  const dt = Math.min(0.05, (ts - last) / 1000 || 0);
  last = ts;
  if (!paused) update(dt);
  draw(ts / 1000);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
