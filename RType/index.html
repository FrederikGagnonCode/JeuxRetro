<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R-Type</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#000;color:#fff;
    font-family:'Courier New',monospace;display:flex;flex-direction:column;
    align-items:center;justify-content:center;user-select:none;overflow:hidden}
  h1{letter-spacing:7px;margin:0 0 8px;font-size:22px;text-shadow:0 0 8px #fff,0 0 18px #39c6e0}
  #wrap{position:relative}
  canvas{background:#000;border:2px solid #fff;display:block;
    box-shadow:0 0 24px rgba(57,198,224,.35);touch-action:none}
  #hint{color:#777;font-size:12px;margin-top:10px;text-align:center;line-height:1.6}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;background:rgba(0,0,0,.82);text-align:center;cursor:pointer}
  #overlay h2{font-size:24px;letter-spacing:3px;margin:0 0 12px}
  #overlay p{color:#bbb;font-size:13px;margin:4px 0}
  .blink{animation:blink 1.1s steps(2,start) infinite}
  @keyframes blink{50%{opacity:0}}
  a.back{color:#4ecca3;font-size:12px;margin-top:8px;text-decoration:none;letter-spacing:1px}
  a.back:hover{text-decoration:underline}
</style>
</head>
<body>
  <h1>R - T Y P E</h1>
  <div id="wrap">
    <canvas id="game" width="560" height="360"></canvas>
    <div id="overlay">
      <h2 id="ovTitle">R-TYPE</h2>
      <p>Détruis l'empire Bydo avec ton chasseur R-9.</p>
      <p>← ↑ ↓ → : voler · Espace : tirer</p>
      <p>MAINTIENS Espace pour CHARGER l'onde de force, relâche pour le rayon !</p>
      <p class="blink" style="margin-top:12px">▶ Cliquez ou Espace pour décoller</p>
    </div>
  </div>
  <div id="hint">Flèches : voler · Espace : tir (maintenir = charge) · P = pause</div>
  <a class="back" href="../index.html">← Menu Arcade</a>

<script>
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
const W=cv.width, H=cv.height, TOP=22, BOT=H-22;
const overlay=document.getElementById('overlay'), ovTitle=document.getElementById('ovTitle');
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rand=n=>Math.floor(Math.random()*n);

let player, shots, ebullets, enemies, parts, stars, boss;
let score, lives, wave, spawnT, charge, charging;
let running=false, paused=false, over=false;
let msg='', msgT=0;
let last=0;
const keys={};
function flash(m){ msg=m; msgT=2.2; }

let _ac=null;
function ac(){ if(!_ac) _ac=new (window.AudioContext||window.webkitAudioContext)(); if(_ac.state==='suspended') _ac.resume(); return _ac; }
function blip(f0,f1,d,vol){ const a=ac(),t=a.currentTime; const o=a.createOscillator(); o.type='square';
  o.frequency.setValueAtTime(f0,t); o.frequency.exponentialRampToValueAtTime(f1,t+d);
  const g=a.createGain(); g.gain.setValueAtTime(vol||0.05,t); g.gain.exponentialRampToValueAtTime(0.001,t+d);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+d+0.02); }
function sfxBeam(lv){ const a=ac(),t=a.currentTime; const o=a.createOscillator(); o.type='sawtooth';
  o.frequency.setValueAtTime(200+lv*160,t); o.frequency.exponentialRampToValueAtTime(80,t+0.3);
  const g=a.createGain(); g.gain.setValueAtTime(0.09,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.32);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+0.34); }

function makePlayer(){ return {x:70,y:H/2,cd:0,inv:2,dead:false}; }
function newGame(){
  player=makePlayer(); shots=[]; ebullets=[]; enemies=[]; parts=[]; boss=null;
  score=0; lives=3; wave=0; spawnT=1; charge=0; charging=false;
  over=false; paused=false; running=true; msg=''; msgT=0;
  overlay.style.display='none';
}
function showOverlay(t,s){ ovTitle.textContent=t; overlay.querySelector('p:nth-of-type(1)').textContent=s; overlay.style.display='flex'; }
function initStars(){ stars=[]; for(let i=0;i<60;i++) stars.push({x:Math.random()*W,y:TOP+Math.random()*(BOT-TOP),s:0.4+Math.random()*1.2,v:20+Math.random()*60}); }

function spawnWave(){
  wave++;
  if(wave%4===0 && !boss){                    // boss Bydo
    boss={x:W+60,y:H/2,hp:30+wave*4,maxHp:30+wave*4,ph:0,cd:1};
    flash('⚠ CROISEUR BYDO ⚠');
    return;
  }
  const kind=rand(3), baseY=TOP+40+rand(BOT-TOP-100);
  if(kind===0){                                // serpent d'orbes
    for(let i=0;i<7;i++) enemies.push({type:'snake',x:W+30+i*26,y:baseY,ph:i*0.55,hp:1,head:i===0});
  } else if(kind===1){                         // tourelles plafond/sol
    for(let i=0;i<3;i++){ const top=Math.random()<0.5;
      enemies.push({type:'turret',x:W+60+i*130,y:top?TOP+8:BOT-8,top,hp:3,cd:0.8+Math.random()}); }
  } else {                                     // chasseurs en arc
    for(let i=0;i<5;i++) enemies.push({type:'arc',x:W+30+i*36,y:baseY,ph:i*0.8,hp:1});
  }
}

document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  if(paused && k!=='p'){ paused=false; return; }
  if((k===' '||k==='enter') && (!running||over)){ newGame(); return; }
  if(k==='p' && running && !over){ paused=!paused; return; }
  if(k===' ' && !keys[k] && running && !over && !paused && !player.dead){
    charging=true; charge=0;
    if(player.cd<=0){ player.cd=0.16;
      shots.push({x:player.x+16,y:player.y,vx:520,dmg:1}); blip(820,220,0.06); }
  }
  keys[k]=true;
});
document.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase(); keys[k]=false;
  if(k===' ' && charging && running && !over && !player.dead){
    if(charge>0.35){
      const lv=charge>=1.4?3:charge>=0.8?2:1;
      shots.push({x:player.x+18,y:player.y,vx:460,dmg:lv*3,beam:lv});
      sfxBeam(lv);
    }
    charging=false; charge=0;
  } else if(k===' '){ charging=false; charge=0; }
});
overlay.addEventListener('click',()=>{ if(!running||over) newGame(); });
cv.addEventListener('touchstart',e=>{ e.preventDefault(); if(!running||over) newGame(); },{passive:false});

function update(dt){
  stars.forEach(s=>{ s.x-=s.v*dt; if(s.x<0){ s.x=W; s.y=TOP+Math.random()*(BOT-TOP); } });
  if(!running||paused||over) return;
  if(msgT>0) msgT-=dt;

  const p=player;
  if(!p.dead){
    let mx=0,my=0;
    if(keys['arrowleft']||keys['a']) mx-=1;
    if(keys['arrowright']||keys['d']) mx+=1;
    if(keys['arrowup']||keys['w']) my-=1;
    if(keys['arrowdown']||keys['s']) my+=1;
    if(mx||my){ const m=Math.hypot(mx,my); p.x+=mx/m*190*dt; p.y+=my/m*190*dt; }
    p.x=clamp(p.x,18,W-40); p.y=clamp(p.y,TOP+12,BOT-12);
    if(p.cd>0) p.cd-=dt;
    if(p.inv>0) p.inv-=dt;
    if(charging) charge=Math.min(1.8,charge+dt);
  }

  shots.forEach(s=>{ s.x+=s.vx*dt; });
  shots=shots.filter(s=>s.x<W+40);

  if(!boss){ spawnT-=dt; if(spawnT<=0){ spawnWave(); spawnT=Math.max(1.4,2.8-wave*0.06); } }

  enemies.forEach(e=>{
    if(e.type==='snake'){ e.x-=105*dt; e.ph+=dt*3.2; e.y+=Math.sin(e.ph)*90*dt; }
    else if(e.type==='arc'){ e.x-=125*dt; e.ph+=dt*2.4; e.y+=Math.cos(e.ph)*110*dt; }
    else if(e.type==='turret'){ e.x-=55*dt;
      e.cd-=dt;
      if(e.cd<=0 && !p.dead && e.x<W){
        const dx=p.x-e.x, dy=p.y-e.y, d=Math.hypot(dx,dy)||1;
        ebullets.push({x:e.x,y:e.y,vx:dx/d*160,vy:dy/d*160,life:4});
        e.cd=1.4+Math.random(); blip(280,110,0.09,0.04);
      }
    }
    e.y=clamp(e.y,TOP+10,BOT-10);
    if((e.type==='snake'||e.type==='arc') && Math.random()<dt*0.16 && !p.dead && e.x<W)
      ebullets.push({x:e.x,y:e.y,vx:-190,vy:0,life:3.5});
  });
  enemies=enemies.filter(e=>e.x>-40);

  if(boss){
    if(boss.x>W-90) boss.x-=50*dt;
    boss.ph+=dt;
    boss.y=H/2+Math.sin(boss.ph*0.8)*90;
    boss.cd-=dt;
    if(boss.cd<=0 && !p.dead){
      for(const a of [-0.4,-0.15,0.15,0.4]){
        ebullets.push({x:boss.x-30,y:boss.y,vx:Math.cos(Math.PI+a)*180,vy:Math.sin(Math.PI+a)*180,life:4});
      }
      boss.cd=Math.max(0.7,1.4-wave*0.03); blip(200,70,0.14,0.06);
    }
  }

  // tirs -> ennemis / boss
  shots.forEach(s=>{
    for(const e of enemies){ if(e.dead) continue;
      const r=e.type==='turret'?13:10;
      if(Math.abs(s.x-e.x)<r+(s.beam?10:0) && Math.abs(s.y-e.y)<r+(s.beam?6:0)){
        e.hp-=s.dmg; if(!s.beam) s.dead=true;
        if(e.hp<=0){ e.dead=true; score+=e.type==='turret'?200:100; burst(e.x,e.y,'#39c6e0',7); }
        if(!s.beam) break;
      } }
    if(boss && Math.abs(s.x-boss.x)<34+(s.beam?10:0) && Math.abs(s.y-boss.y)<30){
      boss.hp-=s.dmg; s.dead=true; burst(s.x,s.y,'#fff',3);
      if(boss.hp<=0){ score+=2000; burst(boss.x,boss.y,'#ff8a3d',26);
        if(window.ArcadeSFX)window.ArcadeSFX.play('explosion');
        boss=null; flash('CROISEUR DÉTRUIT ! +2000'); spawnT=2; }
    }
  });
  shots=shots.filter(s=>!s.dead);
  enemies=enemies.filter(e=>!e.dead);

  ebullets.forEach(b=>{ b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt; });
  ebullets=ebullets.filter(b=>b.life>0 && b.x>-10 && b.x<W+10);

  if(!p.dead && p.inv<=0){
    let hit=false;
    for(const b of ebullets){ if(Math.abs(b.x-p.x)<8 && Math.abs(b.y-p.y)<7){ b.life=0; hit=true; break; } }
    if(!hit) for(const e of enemies){ if(Math.abs(e.x-p.x)<12 && Math.abs(e.y-p.y)<10){ hit=true; break; } }
    if(!hit && boss && Math.abs(boss.x-p.x)<36 && Math.abs(boss.y-p.y)<30) hit=true;
    if(hit) hitPlayer();
  }

  parts.forEach(pt=>{ pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.life-=dt; });
  parts=parts.filter(pt=>pt.life>0);
}
function burst(x,y,col,n){ for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2,s=40+Math.random()*130;
  parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.3+Math.random()*0.35,col}); } }
function hitPlayer(){
  const p=player;
  lives--; p.dead=true; running=false; charging=false; charge=0;
  ArcadeFX.die(cv, p.x, p.y, 'explosion', ()=>{
    if(lives<=0){ over=true; if(window.ArcadeHi)ArcadeHi.submit(score);
      showOverlay('GAME OVER','Vague '+wave+' · Score : '+score); }
    else { player=makePlayer(); running=true; }
  });
}

function draw(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{ ctx.fillStyle='rgba(140,200,240,'+(0.2+s.s*0.3)+')'; ctx.fillRect(s.x,s.y,s.s+0.6,s.s+0.6); });
  // parois organiques Bydo
  ctx.fillStyle='#1c3a44';
  ctx.beginPath(); ctx.moveTo(0,TOP);
  for(let x=0;x<=W;x+=40) ctx.lineTo(x,TOP-8+Math.sin(x*0.05+performance.now()/900)*6);
  ctx.lineTo(W,0); ctx.lineTo(0,0); ctx.fill();
  ctx.beginPath(); ctx.moveTo(0,BOT);
  for(let x=0;x<=W;x+=40) ctx.lineTo(x,BOT+8+Math.sin(x*0.06+performance.now()/1100)*6);
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.fill();

  if(running||over){
    enemies.forEach(e=>{
      ctx.save(); ctx.translate(e.x,e.y);
      if(e.type==='snake'){
        ctx.fillStyle=e.head?'#ff5252':'#e07a3a';
        ctx.beginPath(); ctx.arc(0,0,e.head?10:8,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.4)'; ctx.beginPath(); ctx.arc(-2.6,-2.6,3,0,Math.PI*2); ctx.fill();
        if(e.head){ ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(-4,0,2.2,0,Math.PI*2); ctx.fill(); }
      } else if(e.type==='turret'){
        ctx.fillStyle='#4a6a7a'; ctx.beginPath();
        ctx.arc(0,0,12,e.top?0:Math.PI,e.top?Math.PI:Math.PI*2); ctx.fill();
        ctx.fillStyle='#8ab0c0'; ctx.fillRect(-3,e.top?4:-12,6,8);
      } else {
        ctx.fillStyle='#b06cff'; ctx.beginPath();
        ctx.moveTo(-10,0); ctx.lineTo(6,-7); ctx.lineTo(10,0); ctx.lineTo(6,7); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#e0c0ff'; ctx.beginPath(); ctx.arc(0,0,2.6,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    });
    if(boss){
      ctx.save(); ctx.translate(boss.x,boss.y);
      ctx.fillStyle='#5a2c3a'; ctx.beginPath(); ctx.ellipse(0,0,36,30,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#8a4458'; ctx.beginPath(); ctx.ellipse(-8,-6,17,13,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#2a0e16'; ctx.beginPath(); ctx.arc(-18,0,9,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffd23a'; ctx.beginPath(); ctx.arc(-18,0,4+Math.sin(performance.now()/150)*1.4,0,Math.PI*2); ctx.fill();
      for(let i=0;i<5;i++){ const a2=performance.now()/700+i*1.26;
        ctx.strokeStyle='#8a4458'; ctx.lineWidth=4; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(24,Math.sin(a2)*18);
        ctx.quadraticCurveTo(40,Math.sin(a2+1)*24,52,Math.sin(a2+2)*22); ctx.stroke(); }
      ctx.restore();
      // barre de vie
      ctx.fillStyle='#000'; ctx.fillRect(W/2-81,H-16,162,9);
      ctx.fillStyle='#5a1a1a'; ctx.fillRect(W/2-80,H-15,160,7);
      ctx.fillStyle='#ff5252'; ctx.fillRect(W/2-80,H-15,160*boss.hp/boss.maxHp,7);
    }
    shots.forEach(s=>{
      if(s.beam){ const h=3+s.beam*3;
        ctx.fillStyle='#39c6e0'; ctx.fillRect(s.x-20,s.y-h,30,h*2);
        ctx.fillStyle='#c0f2ff'; ctx.fillRect(s.x-20,s.y-h/2,30,h);
      } else { ctx.fillStyle='#ffe8a0'; ctx.fillRect(s.x-5,s.y-1.6,8,3.2); }
    });
    ctx.fillStyle='#ff7a6a'; ebullets.forEach(b=>{ ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fill(); });
    const p=player;
    if(!p.dead && (p.inv<=0 || Math.floor(p.inv*12)%2)){
      ctx.save(); ctx.translate(p.x,p.y);
      const fl=(Math.floor(performance.now()/60)%2)?1:0;
      ctx.fillStyle='#ff9d2e'; ctx.beginPath(); ctx.moveTo(-13,0); ctx.lineTo(-20-fl*4,-2.4); ctx.lineTo(-20-fl*4,2.4); ctx.fill();
      ctx.fillStyle='#c8d4e0'; ctx.beginPath();
      ctx.moveTo(17,0); ctx.lineTo(4,-6); ctx.lineTo(-12,-4); ctx.lineTo(-12,4); ctx.lineTo(4,6); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#3982e0'; ctx.beginPath(); ctx.moveTo(10,-1.4); ctx.lineTo(2,-4.6); ctx.lineTo(-2,-1.4); ctx.fill();
      ctx.fillStyle='#e04a3a'; ctx.fillRect(-12,-6.6,9,3); ctx.fillRect(-12,3.6,9,3);
      ctx.restore();
      // lueur de charge
      if(charging && charge>0.2){
        const lv=charge>=1.4?3:charge>=0.8?2:1;
        const r=5+charge*7+Math.sin(performance.now()/60)*2;
        ctx.fillStyle=['','rgba(57,198,224,.5)','rgba(120,220,255,.6)','rgba(255,255,255,.7)'][lv];
        ctx.beginPath(); ctx.arc(p.x+22,p.y,r,0,Math.PI*2); ctx.fill();
      }
    }
    parts.forEach(pt=>{ ctx.globalAlpha=Math.max(0,pt.life*2.4); ctx.fillStyle=pt.col; ctx.fillRect(pt.x-1.6,pt.y-1.6,3.2,3.2); });
    ctx.globalAlpha=1;
  }
  // HUD + jauge de charge
  ctx.fillStyle='#fff'; ctx.font='bold 13px "Courier New",monospace'; ctx.textAlign='left';
  ctx.fillText('SCORE '+score, 8, 14);
  ctx.fillStyle='#ff5252'; ctx.fillText('♥'.repeat(Math.max(0,lives)), 140, 14);
  ctx.textAlign='right'; ctx.fillStyle='#9cf'; ctx.fillText('VAGUE '+wave, W-8, 14);
  ctx.fillStyle='#333'; ctx.fillRect(W/2-60,5,120,9);
  ctx.fillStyle=charge>=1.4?'#fff':charge>=0.8?'#7fd6ff':'#39c6e0';
  ctx.fillRect(W/2-60,5,120*Math.min(1,charge/1.8),9);
  ctx.strokeStyle='#5a5a7a'; ctx.lineWidth=1; ctx.strokeRect(W/2-60.5,4.5,121,10);
  if(msgT>0){ ctx.globalAlpha=Math.min(1,msgT); ctx.fillStyle='#ffd23a'; ctx.textAlign='center';
    ctx.font='bold 15px "Courier New",monospace'; ctx.fillText(msg,W/2,H*0.3); ctx.globalAlpha=1; }
  if(paused){ ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='30px "Courier New",monospace'; ctx.fillText('PAUSE',W/2,H/2); }
}

function loop(now){
  const dt=Math.min(0.05,(now-(last||now))/1000); last=now;
  update(dt); draw();
  if(window.ArcadeHi) ArcadeHi.submit(score);
  requestAnimationFrame(loop);
}
initStars();
player=makePlayer(); shots=[]; ebullets=[]; enemies=[]; parts=[]; boss=null;
score=0; lives=3; wave=0; charge=0;
requestAnimationFrame(loop);
</script>
<script src="../music/playlist.js?v=2"></script>
<script src="../music/player.js?v=2"></script>
</body>
</html>
