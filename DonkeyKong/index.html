<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donkey Kong</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#000;color:#fff;
    font-family:'Courier New',monospace;display:flex;flex-direction:column;
    align-items:center;justify-content:center;user-select:none;overflow:hidden}
  h1{letter-spacing:5px;margin:0 0 8px;font-size:20px;
     text-shadow:0 0 8px #fff,0 0 18px #e85d2a}
  #wrap{position:relative}
  canvas{background:#000;border:2px solid #fff;display:block;
    box-shadow:0 0 24px rgba(232,93,42,.4);touch-action:none}
  #hint{color:#777;font-size:12px;margin-top:10px;text-align:center;line-height:1.6}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:rgba(0,0,0,.8);
    text-align:center;cursor:pointer}
  #overlay h2{font-size:24px;letter-spacing:3px;margin:0 0 12px}
  #overlay p{color:#bbb;font-size:13px;margin:4px 0}
  .blink{animation:blink 1.1s steps(2,start) infinite}
  @keyframes blink{50%{opacity:0}}
  a.back{color:#4ecca3;font-size:12px;margin-top:8px;text-decoration:none;letter-spacing:1px}
  a.back:hover{text-decoration:underline}
</style>
</head>
<body>
  <h1>DONKEY KONG</h1>
  <div id="wrap">
    <canvas id="game" width="440" height="520"></canvas>
    <div id="overlay">
      <h2 id="ovTitle">DONKEY KONG</h2>
      <p>Rejoignez Pauline tout en haut</p>
      <p>← → marcher · ↑ ↓ échelles · Espace : sauter</p>
      <p>Sautez par-dessus les tonneaux (+100)</p>
      <p class="blink" style="margin-top:14px">▶ Cliquez ou Espace pour jouer</p>
    </div>
  </div>
  <div id="hint">← → marcher · ↑ ↓ monter/descendre les échelles · Espace : sauter · P = pause</div>
  <a class="back" href="../index.html">← Menu Arcade</a>

<script>
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height, HUD = 36;
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ovTitle');

const X1 = 30, X2 = 410;
const PY = [120, 192, 264, 336, 408, 470];   // hauteurs des poutrelles (bord gauche)
const HAMMER_LIFT = 46;

let platforms, ladders, hammerDefs, TOP, BOTTOM;
let oilX, oilPlat, marioStartX, girderCol, levelBarrels, levelPies;
const dk = { x:330, y:0, arm:0, throwT:90 };
const pauline = { x:140, y:0 };
let hammers = [], fireballs = [], pies = [], oilT = 180, pieT = 90;

function platY(p,x){ const xx = x<p.x1?p.x1 : (x>p.x2?p.x2:x); return p.y + p.slope*(xx-p.x1); }
function platformAt(x, prevFeet, feet){
  let best=null;
  for(const p of platforms){ if(x>=p.x1 && x<=p.x2){ const py=platY(p,x);
    if(prevFeet<=py+1 && feet>=py && (!best || py<best.py)) best={p,py}; } }
  return best;
}

// ── définition des niveaux (le jeu boucle dessus) ──
const LEVELS = [
  { // niveau 1 — poutrelles inclinées (rose-rouge) + tonneaux
    slopes:[0.02,-0.02,0.02,-0.02,0.02,0], belts:[0,0,0,0,0,0], gird:'#d23b5c',
    barrels:true, pies:false,
    ladders:[[0,320,0],[0,200,0],[1,90,0],[1,360,1],[2,350,0],[2,150,1],[3,100,0],[3,380,0],[4,370,1],[4,210,0]],
    hammers:[[3,250],[1,190]], oilIdx:5, oilX:52, dkx:330, paulinex:140, mariox:80 },
  { // niveau 2 — usine à tartes : tapis roulants + plats, pas de tonneaux, boules de feu lentes
    slopes:[0,0,0,0,0,0], belts:[0,1,-1,1,-1,0], gird:'#3aa84a',
    barrels:false, pies:true,
    ladders:[[0,300,0],[0,150,0],[1,70,0],[1,220,0],[1,355,0],[2,110,0],[2,250,0],[2,360,0],[3,80,0],[3,205,0],[3,330,0],[4,150,0],[4,330,0]],
    hammers:[[3,250],[1,90]], oilIdx:2, oilX:220, dkx:330, paulinex:170, mariox:70 },
];

function buildLevel(lvl){
  const L = LEVELS[(lvl-1) % LEVELS.length];
  platforms = PY.map((y,i)=>({x1:X1, x2:X2, y, slope:L.slopes[i], belt:(L.belts?L.belts[i]:0), beltCd:0}));
  TOP = platforms[0]; BOTTOM = platforms[platforms.length-1];
  levelBarrels = L.barrels; levelPies = L.pies;
  ladders = L.ladders.map(([i,x,broken])=>{
    const top=platforms[i], bot=platforms[i+1];
    const yTop=platY(top,x), yBottom=platY(bot,x);
    return { x, yTop, yBottom, topPlat:top, botPlat:bot, broken:!!broken, gapY:yBottom-(yBottom-yTop)*0.45 };
  });
  hammerDefs = L.hammers.map(([i,x])=>({x, y:platY(platforms[i],x)-HAMMER_LIFT}));
  oilPlat = platforms[L.oilIdx]; oilX = L.oilX; girderCol = L.gird; marioStartX = L.mariox;
  dk.x=L.dkx; dk.y=platY(TOP,L.dkx)-2; dk.arm=0; dk.throwT=90;
  pauline.x=L.paulinex; pauline.y=platY(TOP,L.paulinex);
}
buildLevel(1);

const WALK=2.2, CLIMB=2.0, G=0.6, JUMP=8;
const HAMMER_T=300, HAMMER_RESPAWN=900;
let player, barrels, parts;
let score=0, lives=3, level=1, hi=0;
let bonus=5000, bonusT=0;
let running=false, paused=false, over=false, won=false;
const keys={};

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

function resetPlayer(){
  const sx=marioStartX, sy=platY(BOTTOM,sx);
  player = { x:sx, y:sy, baseY:sy, vy:0, onGround:true,
             plat:BOTTOM, climbing:false, lad:null, facing:1, inv:0, walkT:0, hammer:0 };
}
function newGame(){
  score=0; lives=3; level=1; bonus=5000; bonusT=0;
  buildLevel(1);
  resetPlayer(); barrels=[]; parts=[]; fireballs=[]; oilT=180; placePies();
  hammers = hammerDefs.map(d=>({x:d.x, y:d.y, taken:false, respawn:0}));
  over=false; won=false; paused=false; running=true;
  hideOverlay();
}
// passe au niveau suivant en sauvant Pauline
function nextLevel(){
  level++; score += 800 + bonus;
  buildLevel(level);
  resetPlayer(); barrels=[]; fireballs=[]; oilT=180; bonus=5000; bonusT=0; placePies();
  hammers = hammerDefs.map(d=>({x:d.x, y:d.y, taken:false, respawn:0}));
  floatText(W/2, H/2, 'NIVEAU '+level+' !');
}

function showOverlay(title, sub){
  ovTitle.textContent = title;
  overlay.querySelector('p:nth-of-type(1)').textContent = sub;
  overlay.style.display='flex';
}
function hideOverlay(){ overlay.style.display='none'; }

// ---- entrées ----
document.addEventListener('keydown', e=>{
  const k=e.key.toLowerCase();
  keys[k]=true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  if (paused && ['arrowup','arrowdown','arrowleft','arrowright',' ','w','a','s','d'].includes(k)){ paused=false; return; }
  if (k===' '){
    if (!running||over){ newGame(); }
    else if (player.onGround && !player.climbing && player.hammer<=0){ player.vy=-JUMP; player.onGround=false; }
  }
  if (k==='p' && running && !over) paused=!paused;
});
document.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });
overlay.addEventListener('click', ()=>{ if(!running||over) newGame(); });
cv.addEventListener('touchstart', e=>{ e.preventDefault();
  if(!running||over){ newGame(); return; }
  if (player.onGround && !player.climbing && player.hammer<=0){ player.vy=-JUMP; player.onGround=false; }
}, {passive:false});

// ---- joueur ----
function updatePlayer(){
  if (player.inv>0) player.inv--;
  if (player.hammer>0) player.hammer--;

  if (player.climbing){
    const lad = player.lad;
    const topLimit = lad.broken ? lad.gapY : lad.yTop;   // échelle coupée : bloqué au trou
    // sortir de l'échelle en appuyant ← ou → → rejoint la plateforme la plus proche
    if (keys['arrowleft'] || keys['arrowright']){
      if (Math.abs(player.y-lad.yBottom) <= Math.abs(player.y-lad.yTop)){
        player.plat=lad.botPlat; player.y=player.baseY=lad.yBottom;
      } else {
        player.plat=lad.topPlat; player.y=player.baseY=lad.yTop;
      }
      player.climbing=false; player.onGround=true; checkWin(); return;
    }
    if (keys['arrowup']){ player.y -= CLIMB; player.walkT++; }
    if (keys['arrowdown']){ player.y += CLIMB; player.walkT++; }
    player.x = lad.x;
    if (player.y <= topLimit){
      if (lad.broken){ player.y = topLimit; }            // on ne passe pas le trou
      else { player.y=lad.yTop; player.baseY=lad.yTop; player.plat=lad.topPlat; player.climbing=false; player.onGround=true; }
    } else if (player.y >= lad.yBottom){
      player.y=lad.yBottom; player.baseY=lad.yBottom; player.plat=lad.botPlat; player.climbing=false; player.onGround=true;
    }
    checkWin();
    return;
  }

  if (keys['arrowleft']){ player.x-=WALK; player.facing=-1; player.walkT++; }
  if (keys['arrowright']){ player.x+=WALK; player.facing=1; player.walkT++; }
  player.x = clamp(player.x, X1, X2);

  // au sol : suit la pente de la poutrelle
  if (player.onGround && player.plat){ player.y = platY(player.plat, player.x); player.baseY = player.y; }
  // tapis roulant : pousse le joueur
  if (player.onGround && player.plat && player.plat.belt){
    player.x = clamp(player.x + player.plat.belt*0.9, X1, X2);
  }

  // ramasser un marteau : suspendu en l'air → seul le corps en plein saut l'atteint
  if (player.hammer<=0){
    const bodyY = player.y - 12;
    for (const h of hammers){
      if (!h.taken && Math.abs(h.x-player.x)<16 && Math.abs(h.y-bodyY)<16){
        h.taken=true; h.respawn=HAMMER_RESPAWN; player.hammer=HAMMER_T;
        floatText(player.x, player.y-36, 'MARTEAU !');
      }
    }
  }

  // monter/descendre une échelle — PAS si on marche (←/→ prioritaires) ni avec le marteau
  if (player.onGround && player.hammer<=0 && !keys['arrowleft'] && !keys['arrowright']){
    if (keys['arrowup']){
      const lad = ladders.find(l=>!l.broken && Math.abs(l.x-player.x)<14 && Math.abs(l.yBottom-player.baseY)<8);
      if (lad){ player.climbing=true; player.lad=lad; return; }
    }
    if (keys['arrowdown']){
      const lad = ladders.find(l=>!l.broken && Math.abs(l.x-player.x)<14 && Math.abs(l.yTop-player.baseY)<8);
      if (lad){ player.climbing=true; player.lad=lad; player.y+=2; return; }
    }
  }

  // EN PLEIN SAUT : on peut attraper une échelle (sauf les coupées)
  if (!player.onGround && player.hammer<=0 && (keys['arrowup']||keys['arrowdown'])){
    const lad = ladders.find(l=>!l.broken && Math.abs(l.x-player.x)<14 &&
      player.y > l.yTop-6 && player.y < l.yBottom+6);
    if (lad){ player.climbing=true; player.lad=lad; player.x=lad.x; player.vy=0; return; }
  }

  if (!player.onGround){
    player.vy += G;
    player.y += player.vy;
    const gy = platY(player.plat, player.x);     // on retombe sur sa poutrelle
    if (player.vy>=0 && player.y>=gy){
      player.y=gy; player.baseY=gy; player.vy=0; player.onGround=true;
    }
  }
  checkWin();
}

function checkWin(){
  if (player.plat===TOP && Math.abs(player.x-pauline.x)<26 && !player.climbing){
    nextLevel();                                   // Pauline sauvée → niveau suivant
  }
}

function hit(){
  if (player.inv>0 || over || !running) return;
  lives--; running=false;
  ArcadeFX.die(cv, player.x, player.y-14, 'fall', ()=>{
    barrels=[]; fireballs=[]; pies=[];        // on efface tonneaux, boules de feu et tartes
    if (lives<=0){ over=true; if(score>hi)hi=score; showOverlay('GAME OVER','Score : '+score); }
    else { resetPlayer(); player.inv=90; placePies(); running=true; }
  });
}

// ---- tonneaux ----
function spawnBarrel(){
  barrels.push({ x:dk.x-14, y:platY(TOP,dk.x-14), dir:1, vy:0, plat:TOP, air:false, jumped:false });
}
function updateBarrels(){
  // DK lance des tonneaux (seulement aux niveaux à tonneaux)
  if (dk.arm>0) dk.arm--;
  if (levelBarrels){
    dk.throwT--;
    if (dk.throwT<=0){
      spawnBarrel(); dk.arm=18;
      dk.throwT = 110 + Math.random()*90 - level*8;
    }
  }

  barrels.forEach(b=>{
    if (b.air){
      // CHUTE : atterrit sur la poutrelle strictement plus basse
      b.vy += G; b.y += b.vy;
      for (const p of platforms){
        const py=platY(p,b.x);
        if (py > b.fromY+4 && b.x>=p.x1-6 && b.x<=p.x2+6 && b.y>=py && (b.y-b.vy)<=py+2){
          b.y=py; b.vy=0; b.air=false; b.plat=p; b.x=clamp(b.x,p.x1+1,p.x2-1);
          if (p.slope===0) b.dir = -(b.dir||1);    // poutrelle plate : zigzag (inverse à chaque chute)
          break;
        }
      }
    } else {
      // ROULE vers le bas de la pente
      const dir = b.plat.slope>0?1 : (b.plat.slope<0?-1 : (b.dir||1));
      b.dir=dir;
      b.x += dir*(1.5 + Math.abs(b.plat.slope)*9);
      b.y = platY(b.plat, b.x);
      if (b.x < b.plat.x1 || b.x > b.plat.x2){
        b.air=true; b.fromY=platY(b.plat, clamp(b.x,b.plat.x1,b.plat.x2)); b.plat=null; b.vy=0;
      } else if (Math.random()<0.005){
        const down = ladders.find(l=>!l.broken && Math.abs(l.x-b.x)<10 && Math.abs(l.yTop-platY(b.plat,b.x))<8);
        if (down){ b.air=true; b.fromY=platY(b.plat,b.x); b.plat=null; b.vy=0; }
      }
    }

    // marteau : détruit tout tonneau au corps-à-corps (zone généreuse, devant + dessus)
    if (player.hammer>0){
      if (Math.abs(b.x-player.x)<24 && Math.abs((b.y-10)-(player.y-14))<22){
        b.dead=true; score+=300; burst(b.x,b.y-10,'#ffb300'); floatText(b.x,b.y-24,'+300');
        return;
      }
    }

    // collision joueur
    if (Math.abs(b.x-player.x)<16){
      if (player.y <= b.y-18){
        if (!b.jumped && !player.onGround){ b.jumped=true; score+=100; floatText(player.x,player.y-30,'+100'); }
      } else if (player.y > b.y-22 && player.y < b.y+8){
        hit();
      }
    }
  });
  barrels = barrels.filter(b=> b.y < H+30 && !b.dead);

  // réapparition des marteaux
  hammers.forEach(h=>{
    if (h.taken && h.respawn>0){ h.respawn--; if (h.respawn<=0 && player.hammer<=0) h.taken=false; }
  });
  if (barrels.length===0 && false){}
}

// ---- particules / texte ----
function burst(x,y,color,n){ n=n||14;
  for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2,s=Math.random()*3.5+1;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:18+Math.random()*14,color,txt:null}); } }
let floats=[];
function floatText(x,y,txt){ floats.push({x,y,txt,life:40}); }

// ---- boules de feu (sortent du baril d'huile, grimpent vers le joueur) ----
function spawnFireball(){
  if (fireballs.length>=3) return;
  fireballs.push({ x:oilX, y:platY(oilPlat,oilX), plat:oilPlat, dir:Math.random()<.5?-1:1,
    climbing:false, lad:null, climbDir:0, walkT:0 });
}
function updateFireballs(){
  oilT--;
  if (oilT<=0){ spawnFireball(); oilT = 220 + Math.random()*200 - level*10; }
  fireballs.forEach(f=>{
    f.walkT++;
    const fspd = levelPies ? 0.55 : 1.0;             // boules de feu lentes au niveau 2
    if (f.climbing){
      f.y += f.climbDir*fspd*1.5; f.x = f.lad.x;
      if (f.climbDir<0 && f.y<=f.lad.yTop){ f.y=f.lad.yTop; f.plat=f.lad.topPlat; f.climbing=false; }
      else if (f.climbDir>0 && f.y>=f.lad.yBottom){ f.y=f.lad.yBottom; f.plat=f.lad.botPlat; f.climbing=false; }
    } else {
      f.x += f.dir*fspd;
      if (f.x<X1+8){ f.x=X1+8; f.dir=1; } else if (f.x>X2-8){ f.x=X2-8; f.dir=-1; }
      f.y = platY(f.plat, f.x);
      if (Math.random()<0.025){
        const up = player.y < f.y-24;
        const lad = ladders.find(l=>!l.broken && Math.abs(l.x-f.x)<12 &&
          (up ? Math.abs(l.yBottom-f.y)<8 : Math.abs(l.yTop-f.y)<8));
        if (lad){ f.climbing=true; f.lad=lad; f.climbDir=up?-1:1; }
        else if (Math.random()<0.3) f.dir*=-1;
      }
    }
    // marteau : détruit la boule de feu
    if (player.hammer>0 && Math.abs(f.x-player.x)<22 && Math.abs((f.y-10)-(player.y-14))<22){
      f.dead=true; score+=500; burst(f.x,f.y-10,'#ff8a3d'); floatText(f.x,f.y-24,'+500');
    } else if (player.inv<=0 && Math.abs(f.x-player.x)<13 && Math.abs(f.y-player.y)<18){
      hit();
    }
  });
  fireballs = fireballs.filter(f=>!f.dead);
}

// ---- tartes/plats : déjà posées sur les tapis, elles oscillent ; le tapis
//      s'inverse quand une tarte arrive à un bout ----
function placePies(){
  pies = [];
  if (!levelPies) return;
  platforms.forEach(p=>{
    if (!p.belt) return;
    for (let k=0;k<2;k++){
      const x = p.x1 + (p.x2-p.x1)*(0.32 + 0.40*k);
      pies.push({ x, y:platY(p,x), plat:p, jumped:false });
    }
  });
}
function updatePies(){
  if (!levelPies) return;
  platforms.forEach(p=>{ if(p.beltCd>0) p.beltCd--; });
  pies.forEach(pe=>{
    const p = pe.plat;
    pe.x += p.belt*0.8;
    pe.y = platY(p, pe.x);
    // une tarte au bout (dans le sens du tapis) → inverse le tapis
    if (p.belt>0 && pe.x >= p.x2-12){ pe.x=p.x2-12; if(p.beltCd<=0){ p.belt=-1; p.beltCd=18; } }
    else if (p.belt<0 && pe.x <= p.x1+12){ pe.x=p.x1+12; if(p.beltCd<=0){ p.belt=1; p.beltCd=18; } }
    pe.jumped = (player.onGround) ? false : pe.jumped;
    // marteau : détruit la tarte ; sinon contact = mort, saut par-dessus = +100
    if (player.hammer>0 && Math.abs(pe.x-player.x)<24 && Math.abs((pe.y-8)-(player.y-14))<20){
      pe.dead=true; score+=300; burst(pe.x,pe.y-8,'#ffd23a'); floatText(pe.x,pe.y-22,'+300');
    } else if (Math.abs(pe.x-player.x)<15){
      if (player.y <= pe.y-16){
        if (!pe.jumped && !player.onGround){ pe.jumped=true; score+=100; floatText(player.x,player.y-30,'+100'); }
      } else if (player.inv<=0 && player.y > pe.y-20 && player.y < pe.y+8){ hit(); }
    }
  });
  pies = pies.filter(pe=>!pe.dead);
}

function update(){
  if (!running||paused||over) return;
  updatePlayer();
  updateBarrels();
  updateFireballs();
  updatePies();
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;});
  parts=parts.filter(p=>p.life>0);
  floats.forEach(f=>{f.y-=0.6;f.life--;});
  floats=floats.filter(f=>f.life>0);
  // décompte du bonus (façon arcade)
  bonusT++; if(bonusT>=85){ bonusT=0; bonus=Math.max(0, bonus-100); }
}

// ---- rendu ----
function draw(){
  // fond bleu nuit dégradé (comme l'arcade)
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,HUD,0,H);
  bg.addColorStop(0,'#070a1c'); bg.addColorStop(0.5,'#12245a'); bg.addColorStop(1,'#05060f');
  ctx.fillStyle=bg; ctx.fillRect(0,HUD,W,H-HUD);

  // poutrelles INCLINÉES à treillis rose-rouge
  platforms.forEach(p=>{
    const yL=platY(p,p.x1), yR=platY(p,p.x2);
    ctx.save();
    ctx.translate(p.x1, yL);
    ctx.rotate(Math.atan2(yR-yL, p.x2-p.x1));
    const len=Math.hypot(p.x2-p.x1, yR-yL);
    ctx.fillStyle=girderCol; ctx.fillRect(0,0,len,8);
    ctx.fillStyle='rgba(255,255,255,.35)'; ctx.fillRect(0,0,len,2);
    ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fillRect(0,7,len,1.5);
    if (p.belt){
      // tapis roulant : chevrons qui défilent dans le sens du tapis
      const off = ((performance.now()*0.05*p.belt) % 16 + 16) % 16;
      ctx.save(); ctx.beginPath(); ctx.rect(0,0,len,8); ctx.clip();
      ctx.strokeStyle='rgba(0,0,0,.45)'; ctx.lineWidth=2; ctx.lineCap='round';
      for (let x=off-16; x<len+16; x+=16){
        ctx.beginPath(); ctx.moveTo(x,2); ctx.lineTo(x+5*p.belt,4); ctx.lineTo(x,6); ctx.stroke();
      }
      ctx.restore();
    } else {
      ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=1.4; ctx.beginPath();
      let up=true;
      for (let x=0;x<=len;x+=10){ const yy=up?2.5:7; if(x===0)ctx.moveTo(x,yy);else ctx.lineTo(x,yy); up=!up; }
      ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.5)';
      for (let x=5;x<len;x+=24){ ctx.fillRect(x,1,1.5,1.5); ctx.fillRect(x,5.5,1.5,1.5); }
    }
    ctx.restore();
  });

  drawOilDrum();
  if (levelBarrels) drawBarrelStack();

  // échelles (les coupées ont un trou)
  ladders.forEach(l=>{
    ctx.strokeStyle='#5ad1e8'; ctx.lineWidth=2;
    if (l.broken){
      // petit tronçon en haut + tronçon bas, séparés par le trou
      ctx.beginPath();
      ctx.moveTo(l.x-6,l.yTop); ctx.lineTo(l.x-6,l.yTop+9);
      ctx.moveTo(l.x+6,l.yTop); ctx.lineTo(l.x+6,l.yTop+9);
      ctx.moveTo(l.x-6,l.gapY); ctx.lineTo(l.x-6,l.yBottom);
      ctx.moveTo(l.x+6,l.gapY); ctx.lineTo(l.x+6,l.yBottom);
      ctx.stroke();
      for (let y=l.gapY+4; y<l.yBottom; y+=10){ ctx.beginPath(); ctx.moveTo(l.x-6,y); ctx.lineTo(l.x+6,y); ctx.stroke(); }
    } else {
      ctx.beginPath();
      ctx.moveTo(l.x-6,l.yTop); ctx.lineTo(l.x-6,l.yBottom);
      ctx.moveTo(l.x+6,l.yTop); ctx.lineTo(l.x+6,l.yBottom);
      ctx.stroke();
      for (let y=l.yTop+6; y<l.yBottom; y+=10){ ctx.beginPath(); ctx.moveTo(l.x-6,y); ctx.lineTo(l.x+6,y); ctx.stroke(); }
    }
  });

  // marteaux à ramasser
  hammers.forEach(h=>{ if (!h.taken) drawHammerPickup(h); });

  drawPauline(pauline.x, pauline.y);
  drawDK(dk.x, dk.y);

  // tonneaux + boules de feu + tartes
  barrels.forEach(b=>drawBarrel(b));
  fireballs.forEach(f=>drawFireball(f));
  pies.forEach(pe=>drawPie(pe));

  // joueur (clignote si invincible)
  if (!(player.inv>0 && Math.floor(player.inv/5)%2)) drawJumpman(player);
  if (player.hammer>0) drawHeldHammer(player);

  // particules
  parts.forEach(p=>{ ctx.globalAlpha=Math.min(1,p.life/20); ctx.fillStyle=p.color; ctx.fillRect(p.x-1,p.y-1,3,3); });
  ctx.globalAlpha=1;
  // textes flottants
  floats.forEach(f=>{ ctx.globalAlpha=Math.min(1,f.life/20); ctx.fillStyle='#ffd54f';
    ctx.font='bold 13px "Courier New",monospace'; ctx.textAlign='center'; ctx.fillText(f.txt,f.x,f.y); });
  ctx.globalAlpha=1;

  drawHUD();

  if (paused){ ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='30px "Courier New",monospace';
    ctx.fillText('PAUSE',W/2,H/2); }
}

function drawJumpman(p){
  const x=p.x, y=p.y, f=p.facing>0?1:-1; // y = pieds
  ctx.save(); ctx.translate(x,y);
  const step = (!p.climbing && Math.floor(p.walkT/6)%2)?1:0;
  const SKIN='#f0c090', BLUE='#1e5fd0', RED='#e53935', BR='#3a2410', BOOT='#5a2e0c';
  // bottes
  ctx.fillStyle=BOOT;
  if (p.climbing){ ctx.fillRect(-5,-3,4,3); ctx.fillRect(1,-3,4,3); }
  else { ctx.fillRect(-7+step,-3,5,3); ctx.fillRect(2+step,-3,5,3); }
  // jambes (salopette bleue)
  ctx.fillStyle=BLUE; ctx.fillRect(-5,-13,4,11); ctx.fillRect(1,-13,4,11);
  // salopette
  ctx.fillStyle=BLUE; ctx.fillRect(-6,-22,12,10);
  // chemise rouge (épaules) + bretelles bleues
  ctx.fillStyle=RED; ctx.fillRect(-6,-24,12,4);
  ctx.fillStyle=BLUE; ctx.fillRect(-4,-24,2,3); ctx.fillRect(2,-24,2,3);
  ctx.fillStyle='#ffd23a'; ctx.fillRect(-1,-21,2,2); // bouton
  // bras (chemise rouge) + main
  ctx.fillStyle=RED; ctx.fillRect(f>0?5:-8,-23,3,6);
  ctx.fillStyle=SKIN; ctx.fillRect(f>0?7:-9,-18,2,2);
  // tête
  ctx.fillStyle=SKIN; ctx.fillRect(-5,-33,10,9);
  // favoris / cheveux à l'arrière
  ctx.fillStyle=BR; ctx.fillRect(f>0?-6:4,-32,2,8);
  // nez
  ctx.fillStyle='#d89a6a'; ctx.fillRect(f>0?3:-5,-29,3,3);
  // œil
  ctx.fillStyle='#000'; ctx.fillRect(f>0?1:-2,-30,1.5,2);
  // moustache
  ctx.fillStyle=BR; ctx.fillRect(-4,-27,8,2);
  // casquette rouge + visière
  ctx.fillStyle=RED; ctx.fillRect(-6,-35,12,3);
  ctx.fillRect(f>0?4:-9,-33,5,2);
  ctx.restore();
}

function drawBarrel(b){
  const x=b.x, y=b.y-10;
  // corps bombé
  ctx.fillStyle='#a9621f';
  ctx.beginPath(); ctx.ellipse(x,y,11,9,0,0,Math.PI*2); ctx.fill();
  // bande centrale plus claire
  ctx.fillStyle='#c9832e'; ctx.fillRect(x-10,y-3,20,6);
  // cercles métalliques (hoops)
  ctx.fillStyle='#5a300c';
  ctx.fillRect(x-10,y-7,20,2); ctx.fillRect(x-10,y+5,20,2);
  ctx.fillStyle='#3a2008'; ctx.fillRect(x-11,y-1,22,1.5);
  // douves verticales animées → effet de roulement
  const a=(b.x*0.25)%6.283;
  ctx.strokeStyle='#7a4214'; ctx.lineWidth=1.2;
  for(let k=0;k<3;k++){ const px=x+Math.sin(a+k*2.1)*7; ctx.beginPath(); ctx.moveTo(px,y-7); ctx.lineTo(px,y+7); ctx.stroke(); }
  // reflet
  ctx.fillStyle='rgba(255,225,160,.4)'; ctx.fillRect(x-7,y-6,3,3);
}

function drawHammerPickup(h){
  const bob = Math.sin(performance.now()*0.005)*2;
  const x=h.x, y=h.y+bob;            // dessiné centré sur la position flottante
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle='#8a5a2e'; ctx.fillRect(-1.5,-2,3,16);   // manche
  ctx.fillStyle='#cfcfcf'; ctx.fillRect(-7,-8,14,7);     // tête
  ctx.fillStyle='#9e9e9e'; ctx.fillRect(-7,-8,14,2);
  ctx.restore();
}

function drawHeldHammer(p){
  const fwd = Math.floor((HAMMER_T-p.hammer)/10)%2===1;
  ctx.save(); ctx.translate(p.x, p.y);
  if (p.hammer<60 && Math.floor(p.hammer/5)%2) ctx.globalAlpha=0.4; // clignote en fin
  if (fwd){
    // tête en avant
    ctx.rotate(p.facing*0.4);
    ctx.fillStyle='#8a5a2e'; ctx.fillRect(-2,-30,4,18);
    ctx.fillStyle='#cfcfcf'; ctx.fillRect(-8,-38,16,9);
    ctx.fillStyle='#9e9e9e'; ctx.fillRect(-8,-38,16,3);
  } else {
    // tête en haut
    ctx.fillStyle='#8a5a2e'; ctx.fillRect(-2,-40,4,16);
    ctx.fillStyle='#cfcfcf'; ctx.fillRect(-9,-48,18,10);
    ctx.fillStyle='#9e9e9e'; ctx.fillRect(-9,-48,18,3);
  }
  ctx.restore();
}

function drawDK(x,y){
  ctx.save(); ctx.translate(x,y);
  const BR='#7a4a1e', DK='#4f3010', TAN='#d2a878';
  // bras (animation de lancer)
  const ay = dk.arm>0 ? -54 : -40;
  ctx.fillStyle=BR; ctx.fillRect(-33,ay,12,22); ctx.fillRect(21,ay,12,22);
  ctx.fillStyle=TAN; ctx.fillRect(-33,ay+22,12,5); ctx.fillRect(21,ay+22,12,5); // poings
  // corps
  ctx.fillStyle=BR; ctx.fillRect(-22,-50,44,44);
  // poitrine claire
  ctx.fillStyle=TAN; ctx.fillRect(-15,-34,30,24);
  ctx.fillStyle=DK; ctx.fillRect(-5,-34,2,24); // creux central
  // tête
  ctx.fillStyle=BR; ctx.fillRect(-17,-72,34,24);
  ctx.fillRect(-21,-66,5,9); ctx.fillRect(16,-66,5,9);       // oreilles
  // museau clair
  ctx.fillStyle=TAN; ctx.fillRect(-12,-60,24,13);
  // narines + bouche
  ctx.fillStyle=DK; ctx.fillRect(-6,-58,3,3); ctx.fillRect(3,-58,3,3);
  ctx.fillRect(-9,-51,18,2);
  // sourcil épais + yeux
  ctx.fillStyle=DK; ctx.fillRect(-13,-68,26,3);
  ctx.fillStyle='#fff'; ctx.fillRect(-10,-66,7,4); ctx.fillRect(3,-66,7,4);
  ctx.fillStyle='#000'; ctx.fillRect(-6,-65,3,3); ctx.fillRect(4,-65,3,3);
  ctx.restore();
}

function drawPauline(x,y){
  ctx.save(); ctx.translate(x,y);
  const SKIN='#f0c090', DRESS='#ff3b8d';
  // jambes
  ctx.fillStyle=SKIN; ctx.fillRect(-3,-5,2,5); ctx.fillRect(1,-5,2,5);
  // robe (jupe évasée + buste)
  ctx.fillStyle=DRESS;
  ctx.beginPath(); ctx.moveTo(0,-24); ctx.lineTo(-9,-5); ctx.lineTo(9,-5); ctx.closePath(); ctx.fill();
  ctx.fillRect(-5,-29,10,8);
  ctx.fillStyle='#ff7ab8'; ctx.fillRect(-5,-29,10,2); // liseré clair
  // bras
  ctx.fillStyle=SKIN; ctx.fillRect(-7,-27,2,8); ctx.fillRect(5,-27,2,8);
  // tête
  ctx.fillStyle=SKIN; ctx.fillRect(-4,-37,8,8);
  // cheveux blonds (frange + mèches latérales)
  ctx.fillStyle='#ffd54f';
  ctx.fillRect(-5,-39,10,4); ctx.fillRect(-5,-37,2,9); ctx.fillRect(3,-37,2,9);
  // œil
  ctx.fillStyle='#000'; ctx.fillRect(1,-34,1.5,2);
  // cœur au-dessus
  ctx.fillStyle='#ff5252'; ctx.font='10px monospace'; ctx.textAlign='center';
  ctx.fillText('♥', 0, -44);
  ctx.restore();
}

// tonneau statique centré (pour le décor)
function drawKeg(x,cy){
  ctx.fillStyle='#a9621f'; ctx.beginPath(); ctx.ellipse(x,cy,11,9,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c9832e'; ctx.fillRect(x-10,cy-3,20,6);
  ctx.fillStyle='#5a300c'; ctx.fillRect(x-10,cy-7,20,2); ctx.fillRect(x-10,cy+5,20,2);
  ctx.strokeStyle='#7a4214'; ctx.lineWidth=1;
  for(let k=-1;k<=1;k++){ ctx.beginPath(); ctx.moveTo(x+k*5,cy-7); ctx.lineTo(x+k*5,cy+7); ctx.stroke(); }
}
// tas de tonneaux près de DK
function drawBarrelStack(){
  const bx=280, fy=platY(TOP,bx);
  drawKeg(bx-9, fy-9); drawKeg(bx+9, fy-9); drawKeg(bx, fy-26);
}
// baril d'huile en flammes (bas-gauche)
function drawOilDrum(){
  const x=oilX, base=platY(oilPlat,x);
  ctx.fillStyle='#1f4fd0'; ctx.fillRect(x-14, base-30, 28, 30);
  ctx.fillStyle='#2f6fff'; ctx.fillRect(x-14, base-30, 28, 3);
  ctx.fillStyle='#15349a'; ctx.fillRect(x-14, base-24, 28, 2); ctx.fillRect(x-14, base-8, 28, 2);
  ctx.fillStyle='#ffd23a'; ctx.font='bold 9px "Courier New",monospace'; ctx.textAlign='center'; ctx.fillText('OIL', x, base-13);
  const t=performance.now()*0.013;
  for(let i=-1;i<=1;i++){
    const fx=x+i*7, h=11+Math.sin(t+i*1.7)*5;
    ctx.fillStyle='#ff3b00'; ctx.beginPath(); ctx.moveTo(fx-4,base-30); ctx.quadraticCurveTo(fx,base-30-h,fx+4,base-30); ctx.fill();
    ctx.fillStyle='#ffc000'; ctx.beginPath(); ctx.moveTo(fx-2,base-30); ctx.quadraticCurveTo(fx,base-30-h*0.6,fx+2,base-30); ctx.fill();
  }
}
// boule de feu (ennemi du baril d'huile)
function drawFireball(f){
  const x=f.x, y=f.y-10, t=performance.now()*0.02;
  // flammes
  for(let i=-1;i<=1;i++){ const h=8+Math.sin(t+i*2+f.walkT*0.2)*3;
    ctx.fillStyle='#ff3b00'; ctx.beginPath(); ctx.moveTo(x+i*4-3,y); ctx.quadraticCurveTo(x+i*4,y-h,x+i*4+3,y); ctx.fill(); }
  // corps
  ctx.fillStyle='#ffb000'; ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff6a00'; ctx.beginPath(); ctx.arc(x,y+2,5,0,Math.PI*2); ctx.fill();
  // yeux
  ctx.fillStyle='#fff'; ctx.fillRect(x-4,y-2,3,4); ctx.fillRect(x+1,y-2,3,4);
  ctx.fillStyle='#000'; ctx.fillRect(x-3,y-1,1.5,2); ctx.fillRect(x+2,y-1,1.5,2);
}

// tarte / plat sur tapis roulant (à éviter)
function drawPie(pe){
  const x=pe.x, y=pe.y-6;
  ctx.fillStyle='#c0392b'; ctx.beginPath(); ctx.ellipse(x,y,11,7,0,0,Math.PI*2); ctx.fill();   // moule
  ctx.fillStyle='#e8c060'; ctx.beginPath(); ctx.ellipse(x,y-1,9,5,0,0,Math.PI*2); ctx.fill();    // garniture
  ctx.fillStyle='#fff'; for(let i=-1;i<=1;i++) ctx.fillRect(x+i*5-1,y-4,2,7);                     // bandes de pâte
  ctx.fillStyle='#a52e22'; ctx.fillRect(x-11,y+5,22,2);                                            // base
}

// petit Mario d'icône de vie
function drawLifeIcon(x,y){
  ctx.fillStyle='#e53935'; ctx.fillRect(x-3,y-7,6,2);     // casquette
  ctx.fillStyle='#f0c090'; ctx.fillRect(x-3,y-5,6,3);     // visage
  ctx.fillStyle='#1e5fd0'; ctx.fillRect(x-3,y-2,6,4);     // corps
}

function drawHUD(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,HUD);
  ctx.font='bold 14px "Courier New",monospace';
  ctx.textAlign='left';
  ctx.fillStyle='#e53935'; ctx.fillText('SCORE', 10, 14);
  ctx.fillStyle='#fff';    ctx.fillText(String(score).padStart(6,'0'), 10, 28);
  // vies (petits Mario)
  for(let i=0;i<Math.max(0,lives);i++) drawLifeIcon(86+i*16, 14);
  // boîte BONUS
  ctx.strokeStyle='#e53935'; ctx.lineWidth=1.5; ctx.strokeRect(W-92,4,84,26);
  ctx.fillStyle='#e53935'; ctx.textAlign='center'; ctx.fillText('BONUS', W-50, 14);
  ctx.fillStyle='#5ad1e8'; ctx.fillText(String(bonus), W-50, 27);
  ctx.strokeStyle='#333'; ctx.beginPath(); ctx.moveTo(0,HUD-1); ctx.lineTo(W,HUD-1); ctx.stroke();
}

function loop(){ update(); draw(); if(window.ArcadeHi)ArcadeHi.submit(score); requestAnimationFrame(loop); }
resetPlayer(); barrels=[]; parts=[];
loop();
</script>
