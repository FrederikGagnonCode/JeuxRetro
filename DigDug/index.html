<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dig Dug</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#000;color:#fff;
    font-family:'Courier New',monospace;display:flex;flex-direction:column;
    align-items:center;justify-content:center;user-select:none;overflow:hidden}
  h1{letter-spacing:6px;margin:0 0 8px;font-size:22px;
     text-shadow:0 0 8px #fff,0 0 18px #ffb300}
  #wrap{position:relative}
  canvas{background:#000;border:2px solid #fff;display:block;
    box-shadow:0 0 24px rgba(255,179,0,.35);touch-action:none}
  #hint{color:#777;font-size:12px;margin-top:10px;text-align:center;line-height:1.6}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:rgba(0,0,0,.8);
    text-align:center;cursor:pointer}
  #overlay h2{font-size:26px;letter-spacing:3px;margin:0 0 12px}
  #overlay p{color:#bbb;font-size:14px;margin:4px 0}
  .blink{animation:blink 1.1s steps(2,start) infinite}
  @keyframes blink{50%{opacity:0}}
  a.back{color:#4ecca3;font-size:12px;margin-top:8px;text-decoration:none;letter-spacing:1px}
  a.back:hover{text-decoration:underline}
</style>
</head>
<body>
  <h1>D I G &nbsp; D U G</h1>
  <div id="wrap">
    <canvas id="game" width="420" height="484"></canvas>
    <div id="overlay">
      <h2 id="ovTitle">DIG DUG</h2>
      <p>Creusez et éliminez tous les monstres</p>
      <p>Flèches : creuser · Espace : pompe</p>
      <p>Gonflez-les jusqu'à éclater, ou écrasez-les sous un rocher</p>
      <p class="blink" style="margin-top:14px">▶ Cliquez ou Espace pour jouer</p>
    </div>
  </div>
  <div id="hint">Flèches : se déplacer / creuser · Espace (maintenir) : pomper · P = pause</div>
  <a class="back" href="../index.html">← Menu Arcade</a>

<script>
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
const COLS = 14, ROWS = 15, CELL = 30;
const HUD = 34;
const GW = COLS*CELL;

const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ovTitle');

let grid = [];          // 1 = terre, 0 = galerie
let player, enemies, rocks;
let score = 0, lives = 3, level = 1;
let running = false, paused = false, over = false;
const keys = {};

const cx = c => c*CELL + CELL/2;
const cy = r => HUD + r*CELL + CELL/2;
const inb = (c,r) => c>=0 && c<COLS && r>=0 && r<ROWS;
const lerp = (a,b,t)=>a+(b-a)*t;

// couches de terre par bandes
const strata = ['#c98a3a','#b5722e','#9c5a25','#7d4a3a','#5a3a55'];
function dirtColor(r){ return strata[Math.min(strata.length-1, Math.floor(r/3))]; }

function setupLevel(){
  grid = [];
  for (let r=0;r<ROWS;r++){ grid.push(new Array(COLS).fill(1)); }

  // puits de départ vertical
  for (let r=0;r<4;r++) grid[r][6] = 0;

  player = { col:6, row:0, px:cx(6), py:cy(0), facing:'down',
             moving:false, from:null, to:null, prog:0 };

  // ennemis avec poche creusée
  const defs = [
    {c:2, r:6, type:'pooka'}, {c:11,r:6, type:'fygar'},
    {c:3, r:11,type:'pooka'}, {c:10,r:11,type:'fygar'},
    {c:6, r:13,type:'pooka'}
  ];
  enemies = defs.map(d=>{
    grid[d.r][d.c] = 0;
    return { col:d.c, row:d.r, px:cx(d.c), py:cy(d.r), type:d.type,
      facing:'left', moving:false, from:null, to:null, prog:0,
      ghost:false, ghostCells:0, inflate:0, deflateT:0, fire:null, fireCd:120+Math.random()*120,
      thinkT:0 };
  });

  // rochers (cases de terre, terre en dessous au départ)
  const rdefs = [{c:4,r:4},{c:9,r:5},{c:8,r:9},{c:5,r:8},{c:11,r:10}];
  rocks = rdefs.filter(d=>grid[d.r][d.c]===1).map(d=>({
    col:d.c, row:d.r, py:cy(d.r), state:'idle', wob:0, prog:0, fromY:cy(d.r)
  }));
}

function newGame(){
  score = 0; lives = 3; level = 1;
  setupLevel();
  harpoon = null;
  over=false; paused=false; running=true;
  hideOverlay();
}
function nextLevel(){
  level++;
  setupLevel();
  harpoon = null;
}

function showOverlay(title, sub){
  ovTitle.textContent = title;
  overlay.querySelector('p:nth-of-type(1)').textContent = sub;
  overlay.style.display='flex';
}
function hideOverlay(){ overlay.style.display='none'; }

// ---- entrées ----
document.addEventListener('keydown', e=>{
  const k = e.key.toLowerCase();
  keys[k]=true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  if (paused && ['arrowup','arrowdown','arrowleft','arrowright',' ','w','a','s','d'].includes(k)){ paused=false; return; }
  if (k===' '){ if(!running||over) newGame(); }
  if (k==='p' && running && !over) paused=!paused;
});
document.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });
overlay.addEventListener('click', ()=>{ if(!running||over) newGame(); });
cv.addEventListener('touchstart', e=>{ e.preventDefault(); if(!running||over) newGame(); }, {passive:false});

const DIRS = { left:[-1,0], right:[1,0], up:[0,-1], down:[0,1] };

// ---- pompe / harpon ----
let harpoon = null; // {dir, cells:[{c,r}], hooked:enemy}
let inflTimer = 0;

function updatePump(){
  const space = keys[' '];

  if (space && !player.moving){
    // viser : une flèche maintenue réoriente le harpon
    if (keys['arrowleft']) player.facing='left';
    else if (keys['arrowright']) player.facing='right';
    else if (keys['arrowup']) player.facing='up';
    else if (keys['arrowdown']) player.facing='down';

    // (re)calculer la portée à chaque frame, à travers les galeries
    const [dx,dy] = DIRS[player.facing];
    const cells=[];
    let c=player.col, r=player.row;
    for (let i=0;i<2;i++){
      c+=dx; r+=dy;
      if (!inb(c,r) || grid[r][c]===1) break;
      cells.push({c,r});
    }
    if (!harpoon){ harpoon = { dir:player.facing, cells, hooked:null }; inflTimer=0; }
    else { harpoon.dir=player.facing; harpoon.cells=cells; }

    // accrocher un monstre devant si pas déjà accroché
    if (!harpoon.hooked){
      for (const cell of cells){
        const en = enemies.find(e=>e.col===cell.c && e.row===cell.r);
        if (en){ harpoon.hooked=en; en.pumped=true; inflTimer=0; break; }
      }
    }

    // gonfler le monstre accroché
    if (harpoon.hooked){
      const en = harpoon.hooked;
      en.pumped=true; en.deflateT=0;
      inflTimer++;
      if (inflTimer % 9 === 0){
        en.inflate++;
        if (en.inflate >= 4){
          score += (en.type==='fygar'?300:200) + level*20;
          burst(en.px, en.py, en.type==='fygar'?'#7CFC00':'#ff5252');
          enemies = enemies.filter(x=>x!==en);
          harpoon=null;
        }
      }
    }
  } else {
    harpoon=null;
  }

  // dégonflage progressif des monstres relâchés
  enemies.forEach(en=>{
    const beingPumped = harpoon && harpoon.hooked===en;
    if (en.inflate>0 && !beingPumped){
      en.deflateT++;
      if (en.deflateT % 18 === 0){ en.inflate--; if (en.inflate<=0){ en.pumped=false; } }
    } else if (en.pumped && !beingPumped && en.inflate<=0){
      en.pumped=false; // relâché avant tout gonflage : ne pas le figer
    }
  });
}

// ---- joueur ----
function updatePlayer(){
  if (player.moving){
    player.prog += 0.18;
    if (player.prog>=1){
      player.col=player.to.c; player.row=player.to.r;
      player.px=cx(player.col); player.py=cy(player.row);
      player.moving=false;
    } else {
      player.px = lerp(cx(player.from.c), cx(player.to.c), player.prog);
      player.py = lerp(cy(player.from.r), cy(player.to.r), player.prog);
    }
    return;
  }
  if (keys[' ']) return; // immobile pendant la pompe
  let dir=null;
  if (keys['arrowleft']) dir='left';
  else if (keys['arrowright']) dir='right';
  else if (keys['arrowup']) dir='up';
  else if (keys['arrowdown']) dir='down';
  if (!dir) return;
  player.facing=dir;
  const [dx,dy]=DIRS[dir];
  const nc=player.col+dx, nr=player.row+dy;
  if (!inb(nc,nr)) return;
  grid[nr][nc]=0; // creuse
  player.from={c:player.col,r:player.row};
  player.to={c:nc,r:nr};
  player.prog=0; player.moving=true;
}

// ---- ennemis ----
function enemyDist(en){ return Math.abs(en.col-player.col)+Math.abs(en.row-player.row); }

function updateEnemies(){
  enemies.forEach(en=>{
    if (en.inflate>0 || en.pumped) return; // gonflé / accroché = bloqué

    // souffle du Fygar
    if (en.type==='fygar'){
      if (en.fire){
        en.fire.t--;
        spawnEmbers(en);                     // braises qui s'envolent
        if (en.fire.t<=0) en.fire=null;
      }
      else { en.fireCd--;
        if (en.fireCd<=0 && !en.moving && en.row===player.row && !en.ghost){
          const dir = player.col<en.col?'left':'right';
          const [dx]=DIRS[dir]; let cc=en.col, ok=true, len=0;
          for (let i=0;i<3;i++){ cc+=dx; if(!inb(cc,en.row)||grid[en.row][cc]===1){break;} len++; }
          if (len>0){ en.facing=dir; en.fire={dir,len,t:FIRE_T}; }
          en.fireCd=140+Math.random()*120;
        }
      }
    }

    if (en.moving){
      en.prog += en.ghost?0.03:0.026;
      if (en.prog>=1){
        en.col=en.to.c; en.row=en.to.r;
        en.px=cx(en.col); en.py=cy(en.row);
        en.moving=false;
        if (en.ghost){ en.ghostCells--; if (en.ghostCells<=0 && grid[en.row][en.col]===0) en.ghost=false; }
      } else {
        en.px=lerp(cx(en.from.c),cx(en.to.c),en.prog);
        en.py=lerp(cy(en.from.r),cy(en.to.r),en.prog);
      }
      return;
    }

    // choisir une direction
    const opts = [];
    for (const d in DIRS){
      const [dx,dy]=DIRS[d];
      const nc=en.col+dx, nr=en.row+dy;
      if (!inb(nc,nr)) continue;
      const tunnel = grid[nr][nc]===0;
      const dist = Math.abs(nc-player.col)+Math.abs(nr-player.row);
      opts.push({d,nc,nr,tunnel,dist});
    }
    const tunnelOpts = opts.filter(o=>o.tunnel);

    let choice=null;
    if (en.ghost){
      // traverse la terre en ligne vers le joueur
      opts.sort((a,b)=>a.dist-b.dist);
      choice = opts[0];
    } else if (tunnelOpts.length){
      tunnelOpts.sort((a,b)=>a.dist-b.dist);
      // 70% vers le meilleur, sinon au hasard ; éviter de faire demi-tour si possible
      choice = (Math.random()<0.7) ? tunnelOpts[0]
               : tunnelOpts[Math.floor(Math.random()*tunnelOpts.length)];
      // passage fantôme occasionnel si coincé loin
      if (tunnelOpts[0].dist >= enemyDist(en) && Math.random()<0.005){
        en.ghost=true; en.ghostCells=2+Math.floor(Math.random()*3);
        opts.sort((a,b)=>a.dist-b.dist); choice=opts[0];
      }
    } else {
      en.ghost=true; en.ghostCells=2+Math.floor(Math.random()*3);
      opts.sort((a,b)=>a.dist-b.dist); choice=opts[0];
    }
    if (!choice) return;
    en.facing = choice.d;
    en.from={c:en.col,r:en.row}; en.to={c:choice.nc,r:choice.nr};
    en.prog=0; en.moving=true;
  });
}

// ---- rochers ----
function updateRocks(){
  rocks.forEach(rk=>{
    if (rk.state==='idle'){
      if (rk.row+1<ROWS && grid[rk.row+1][rk.col]===0){ rk.state='wobble'; rk.wob=40; }
    } else if (rk.state==='wobble'){
      rk.wob--; if (rk.wob<=0){ rk.state='falling'; rk.fromY=cy(rk.row); rk.prog=0; rk.startFall=true; }
    } else if (rk.state==='falling'){
      if (rk.startFall){
        // peut-on descendre ?
        if (rk.row+1>=ROWS || grid[rk.row+1][rk.col]===1){ rk.state='gone'; return; }
        rk.from=rk.row; rk.to=rk.row+1; rk.prog=0; rk.startFall=false;
      }
      rk.prog += 0.2;
      rk.py = lerp(cy(rk.from), cy(rk.to), Math.min(rk.prog,1));
      crushFalling(rk);   // écrase TOUT ce qui se trouve sur son passage
      if (rk.prog>=1){
        rk.row=rk.to;
        if (rk.row+1>=ROWS || grid[rk.row+1][rk.col]===1){ rk.state='gone'; }
        else { rk.startFall=true; }
      }
    }
  });
  rocks = rocks.filter(r=>r.state!=='gone');
}
// détection continue, en pixels : tous les monstres traversés meurent
function crushFalling(rk){
  const rx = cx(rk.col), ry = rk.py;
  enemies = enemies.filter(en=>{
    if (Math.abs(en.px-rx) < CELL*0.55 && Math.abs(en.py-ry) < CELL*0.7){
      score += 1000; burst(en.px, en.py, '#ffb300'); return false;
    }
    return true;
  });
  if (Math.abs(player.px-rx) < CELL*0.55 && Math.abs(player.py-ry) < CELL*0.7) loseLife();
}

// ---- collisions ----
function checkHazards(){
  enemies.forEach(en=>{
    if (en.inflate>0) return;
    if (Math.abs(en.px-player.px)<CELL*0.7 && Math.abs(en.py-player.py)<CELL*0.7){
      loseLife();
    }
    if (en.fire){
      const [dx]=DIRS[en.fire.dir];
      for (let i=1;i<=en.fire.len;i++){
        if (player.col===en.col+dx*i && player.row===en.row){ loseLife(); }
      }
    }
  });
}

function loseLife(){
  if (over||!running) return;
  lives--; running=false;
  ArcadeFX.die(cv, player.px, player.py-10, 'splat', ()=>{
    if (lives<=0){ over=true; showOverlay('GAME OVER','Score : '+score); }
    else {
      player.col=6; player.row=0; player.px=cx(6); player.py=cy(0);
      player.moving=false; player.facing='down'; harpoon=null;
      for (let r=0;r<4;r++) grid[r][6]=0;
      running=true;
    }
  });
}

// particules
let parts=[];
const FIRE_T = 34;                          // durée du souffle (frames)
function burst(x,y,color,n){ n=n||14;
  for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2,s=Math.random()*3.5+1;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:18+Math.random()*14,color}); } }

// braises projetées le long du souffle, qui s'envolent
function spawnEmbers(en){
  const f = en.fire; if (!f) return;
  const dir = DIRS[f.dir][0];
  for (let i=0;i<2;i++){
    const u = Math.random();                 // position le long de la flamme
    const x = en.px + dir*(CELL*0.45 + u*f.len*CELL);
    const y = en.py + (Math.random()-0.5)*CELL*0.5;
    parts.push({ x, y,
      vx: dir*(0.4+Math.random()*1.4),
      vy: -(0.4+Math.random()*1.3),          // monte
      life: 10+Math.random()*12,
      color: Math.random()<0.5 ? '#ffd54f' : '#ff7043' });
  }
}

function update(){
  if (!running||paused||over) return;
  updatePump();
  updatePlayer();
  updateEnemies();
  updateRocks();
  checkHazards();
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
  parts=parts.filter(p=>p.life>0);
  if (enemies.length===0){ score+=1000; nextLevel(); }
}

// ---- rendu ----
function draw(){
  ctx.clearRect(0,0,GW,cv.height);

  // terre
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++){
    if (grid[r][c]===1){
      ctx.fillStyle = dirtColor(r);
      ctx.fillRect(c*CELL, HUD+r*CELL, CELL, CELL);
      ctx.fillStyle = 'rgba(0,0,0,.08)';
      ctx.fillRect(c*CELL, HUD+r*CELL, CELL, 2);
    }
  }

  // rochers
  rocks.forEach(rk=>{
    const x=cx(rk.col), y=rk.py;
    const dx = rk.state==='wobble' ? Math.sin(rk.wob*0.8)*2 : 0;
    ctx.fillStyle='#9e9e9e';
    ctx.beginPath(); ctx.arc(x+dx,y,CELL*0.42,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#cfcfcf'; ctx.beginPath(); ctx.arc(x+dx-4,y-4,CELL*0.16,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#666'; ctx.lineWidth=1; ctx.stroke();
  });

  // harpon
  if (harpoon && harpoon.cells.length){
    const [dx,dy]=DIRS[harpoon.dir];
    const tip = harpoon.cells[harpoon.cells.length-1];
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(player.px,player.py); ctx.lineTo(cx(tip.c),cy(tip.r)); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.fillRect(cx(tip.c)-3,cy(tip.r)-3,6,6);
  }

  // ennemis
  enemies.forEach(en=>drawEnemy(en));

  // souffle du Fygar
  enemies.forEach(en=>{ if (en.fire) drawFire(en); });

  // joueur
  drawPlayer();

  // particules
  parts.forEach(p=>{ ctx.globalAlpha=p.life/30; ctx.fillStyle=p.color; ctx.fillRect(p.x-1,p.y-1,3,3); });
  ctx.globalAlpha=1;

  drawHUD();

  if (paused){ ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(0,0,GW,cv.height);
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='30px "Courier New",monospace';
    ctx.fillText('PAUSE',GW/2,cv.height/2); }
}

// ---- moteur de sprites pixel-art ----
function drawSprite(cx, cy, rows, pal, px, flip){
  const h=rows.length, w=rows[0].length;
  const ox = cx - w*px/2, oy = cy - h*px/2;
  for (let r=0;r<h;r++){
    const row=rows[r];
    for (let c=0;c<w;c++){
      const ch = row[flip ? (w-1-c) : c];
      const col = pal[ch];
      if (!col) continue;                       // '.' ou ' ' = transparent
      ctx.fillStyle = col;
      ctx.fillRect(Math.round(ox+c*px), Math.round(oy+r*px), Math.ceil(px), Math.ceil(px));
    }
  }
}

// Dig Dug : combinaison blanche, visière cyan, bottes rouges
const SPR_DIGDUG = [
  "..WWWWW..",
  ".WWWWWWW.",
  ".WWWWWWW.",
  ".WCCCCCW.",
  ".WCKCKCW.",
  ".WWWWWWW.",
  ".WWWWWWW.",
  ".WWWWWWW.",
  ".WW.W.WW.",
  ".RR...RR.",
];
const PAL_DIGDUG = { W:'#f5f5f5', C:'#2bb0f0', K:'#10243a', R:'#e53b2e' };

// Pooka : rouge, grosses lunettes blanches, contour orange, pattes rouges
const SPR_POOKA = [
  "..OOOOO..",
  ".ORRRRRO.",
  ".RWWWWWR.",
  ".RWKWKWR.",
  ".RWWWWWR.",
  ".RRRRRRR.",
  ".ORRRRRO.",
  "..R...R..",
  "..R...R..",
];
const PAL_POOKA = { R:'#e23b2e', O:'#ff9a3c', W:'#ffffff', K:'#101418' };

// Fygar : dragon vert, yeux blancs, dents, crête jaune, pattes rouges
const SPR_FYGAR = [
  "...YgY...",
  "..gGGGg..",
  ".gGGGGGg.",
  ".GWWWWWG.",
  ".GWKWKWG.",
  ".gGGGGGg.",
  ".gTTTTTg.",
  ".gGGGGGg.",
  "..gGGg...",
  "..R...R..",
];
const PAL_FYGAR = { G:'#3fae45', g:'#1c5e22', W:'#ffffff', K:'#101418', T:'#eafff0', R:'#e23b2e', Y:'#ffd23a' };

function drawEnemy(en){
  const x=en.px, y=en.py;
  if (en.ghost){
    // yeux fantômes (traverse la terre)
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(x-5,y,4,0,Math.PI*2); ctx.arc(x+5,y,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1565c0';
    ctx.beginPath(); ctx.arc(x-5,y,2,0,Math.PI*2); ctx.arc(x+5,y,2,0,Math.PI*2); ctx.fill();
    return;
  }
  const px = 3 + en.inflate;                    // gonfle = pixels plus gros
  if (en.type==='pooka') drawSprite(x,y,SPR_POOKA,PAL_POOKA,px,false);
  else                   drawSprite(x,y,SPR_FYGAR,PAL_FYGAR,px,false);
  // halo blanc quand prêt à éclater
  if (en.inflate>=3){
    ctx.globalAlpha=0.25; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(x,y,px*5,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}

function drawFire(en){
  const f = en.fire;
  const dir = DIRS[f.dir][0];              // -1 (gauche) ou 1 (droite)
  const y = en.py;
  const x0 = en.px + dir*CELL*0.45;        // gueule du Fygar
  const age = FIRE_T - f.t;                // 0 au départ → FIRE_T à la fin
  const grow = Math.min(1, age/5);         // s'étend en ~5 frames
  const fade = Math.min(1, f.t/9);         // se rétracte sur les dernières frames
  const x1 = x0 + dir*(f.len*CELL)*grow;   // pointe de la flamme
  const t = performance.now()*0.018;

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';   // lueur additive

  // 3 couches : rouge large → orange → cœur jaune/blanc
  const layers = [
    {col:'rgba(213,40,30,0.5)',   h:CELL*0.5 },
    {col:'rgba(255,140,0,0.6)',   h:CELL*0.36},
    {col:'rgba(255,236,140,0.85)',h:CELL*0.20}
  ];
  for (let li=0; li<layers.length; li++){
    const L = layers[li];
    const steps = 14;
    ctx.beginPath();
    // bord supérieur (langues de feu ondulantes)
    for (let i=0;i<=steps;i++){
      const u = i/steps;
      const px = x0 + (x1-x0)*u;
      const env = Math.sin(Math.min(u,0.999)*Math.PI);          // fin aux deux bouts
      const wob = 1 + 0.22*Math.sin(u*11 - t*1.4 + en.col+li)
                    + 0.12*Math.sin(u*23 + t*2.1);
      const hh = L.h*fade*(0.28+env)*wob;
      if (i===0) ctx.moveTo(px, y-hh); else ctx.lineTo(px, y-hh);
    }
    // bord inférieur (retour)
    for (let i=steps;i>=0;i--){
      const u = i/steps;
      const px = x0 + (x1-x0)*u;
      const env = Math.sin(Math.min(u,0.999)*Math.PI);
      const wob = 1 + 0.22*Math.sin(u*11 + t*1.6 + en.col+li+3)
                    + 0.12*Math.sin(u*19 - t*1.9);
      const hh = L.h*fade*(0.28+env)*wob;
      ctx.lineTo(px, y+hh);
    }
    ctx.closePath();
    const g = ctx.createLinearGradient(x0,y,x1,y);
    g.addColorStop(0, L.col);
    g.addColorStop(0.85, L.col.replace(/0\.\d+\)/, '0.25)'));
    g.addColorStop(1, 'rgba(255,80,0,0)');
    ctx.fillStyle = g;
    ctx.fill();
  }

  // halo à la gueule
  const glow = ctx.createRadialGradient(x0,y,0, x0,y, CELL*0.7*fade);
  glow.addColorStop(0,'rgba(255,230,150,0.7)');
  glow.addColorStop(1,'rgba(255,120,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(x0,y,CELL*0.7*fade,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawPlayer(){
  const flip = (player.facing==='left');        // sprite orienté à droite par défaut
  drawSprite(player.px, player.py, SPR_DIGDUG, PAL_DIGDUG, 3, flip);
}

function drawHUD(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,GW,HUD);
  ctx.fillStyle='#fff'; ctx.font='15px "Courier New",monospace';
  ctx.textAlign='left'; ctx.fillText('SCORE '+score, 10, 23);
  ctx.textAlign='center'; ctx.fillStyle='#ffb300'; ctx.fillText('NIVEAU '+level, GW/2, 23);
  ctx.textAlign='right'; ctx.fillStyle='#4ecca3'; ctx.fillText('VIES '+lives, GW-10, 23);
  ctx.strokeStyle='#333'; ctx.beginPath(); ctx.moveTo(0,HUD-1); ctx.lineTo(GW,HUD-1); ctx.stroke();
}

function loop(){ update(); draw(); if(window.ArcadeHi)ArcadeHi.submit(score); requestAnimationFrame(loop); }
setupLevel();   // prépare le plateau pour le rendu derrière l'écran d'accueil
loop();
</script>
