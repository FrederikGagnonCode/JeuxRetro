<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mortal Kombat</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#000;color:#fff;
    font-family:'Courier New',monospace;display:flex;flex-direction:column;
    align-items:center;justify-content:center;user-select:none;overflow:hidden}
  h1{letter-spacing:5px;margin:0 0 8px;font-size:21px;
     text-shadow:0 0 8px #fff,0 0 18px #e8b23a}
  #wrap{position:relative}
  canvas{background:#0a0a14;border:2px solid #fff;display:block;
    box-shadow:0 0 24px rgba(232,178,58,.4);touch-action:none}
  #hint{color:#777;font-size:12px;margin-top:10px;text-align:center;line-height:1.6}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:rgba(0,0,0,.82);
    text-align:center;cursor:pointer}
  #overlay h2{font-size:24px;letter-spacing:3px;margin:0 0 12px}
  #overlay p{color:#bbb;font-size:13px;margin:4px 0}
  .blink{animation:blink 1.1s steps(2,start) infinite}
  @keyframes blink{50%{opacity:0}}
  a.back{color:#4ecca3;font-size:12px;margin-top:8px;text-decoration:none;letter-spacing:1px}
  a.back:hover{text-decoration:underline}
</style>
</head>
<body>
  <h1>MORTAL KOMBAT</h1>
  <div id="wrap">
    <canvas id="game" width="560" height="360"></canvas>
    <div id="overlay">
      <h2 id="ovTitle">MORTAL KOMBAT</h2>
      <p>Bats tes adversaires en 2 rounds gagnants.</p>
      <p>← → se déplacer · ↑ sauter · ↓ s'accroupir</p>
      <p>X : coup de poing · C : coup de pied · S : garde</p>
      <p class="blink" style="margin-top:12px">▶ Cliquez ou Espace pour combattre</p>
    </div>
  </div>
  <div id="hint">← → bouger · ↑ saut · ↓ accroupi · X poing · C pied · S garde · P = pause</div>
  <a class="back" href="../index.html">← Menu Arcade</a>

<script>
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
const W=cv.width, H=cv.height;
const overlay=document.getElementById('overlay');
const ovTitle=document.getElementById('ovTitle');
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rand=n=>Math.floor(Math.random()*n);

const GROUND=H-58;
const OPPONENTS=[
  {name:'SERPENT JAUNE', col:'#e8c23a', dk:'#a8861c', ai:0.9},
  {name:'GIVRE BLEU',    col:'#3a9ae8', dk:'#1c64a8', ai:1.1},
  {name:'OMBRE VERTE',   col:'#3ae86a', dk:'#1ca844', ai:1.3},
  {name:'BRUME GRISE',   col:'#b8b8c8', dk:'#78788a', ai:1.5},
  {name:'FEU ROUGE',     col:'#e84a3a', dk:'#a81c1c', ai:1.8},
];
let p1, p2, matchN, roundN, wins1, wins2, timer, score;
let phase='idle';                 // idle | intro | fight | roundend | finish | over
let phaseT=0, banner='', blood=[];
let running=false, paused=false, over=false;
let last=0;
const keys={};

// ── audio ──
let _ac=null;
function ac(){ if(!_ac) _ac=new (window.AudioContext||window.webkitAudioContext)(); if(_ac.state==='suspended') _ac.resume(); return _ac; }
function sfxHit(hard){ const a=ac(),t=a.currentTime;
  const n=Math.floor(a.sampleRate*0.12), b=a.createBuffer(1,n,a.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=Math.random()*2-1;
  const src=a.createBufferSource(); src.buffer=b;
  const lp=a.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=hard?700:1100;
  const g=a.createGain(); g.gain.setValueAtTime(hard?0.16:0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  src.connect(lp); lp.connect(g); g.connect(a.destination); src.start(t);
  const o=a.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(hard?130:190,t);
  o.frequency.exponentialRampToValueAtTime(60,t+0.1);
  const og=a.createGain(); og.gain.setValueAtTime(0.12,t); og.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  o.connect(og); og.connect(a.destination); o.start(t); o.stop(t+0.13); }
function sfxBlock(){ const a=ac(),t=a.currentTime; const o=a.createOscillator(); o.type='square';
  o.frequency.setValueAtTime(240,t); const g=a.createGain(); g.gain.setValueAtTime(0.06,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.07); o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+0.08); }
function sfxGong(){ const a=ac(),t=a.currentTime; const o=a.createOscillator(); o.type='triangle';
  o.frequency.setValueAtTime(196,t); o.frequency.exponentialRampToValueAtTime(130,t+1.2);
  const g=a.createGain(); g.gain.setValueAtTime(0.22,t); g.gain.exponentialRampToValueAtTime(0.001,t+1.4);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+1.5); }

function makeFighter(x,face,isP1,opp){
  return { x, y:0, vy:0, face, hp:100, isP1,
    col: isP1?'#3a5ae8':opp.col, dk: isP1?'#1c2ea8':opp.dk,
    state:'idle', atkT:0, atkType:null, hitT:0, blocking:false, crouch:false,
    cpuT:0.5, walk:0 };
}
function startMatch(){
  const opp=OPPONENTS[Math.min(matchN,OPPONENTS.length-1)];
  wins1=0; wins2=0;
  startRound();
}
function startRound(){
  const opp=OPPONENTS[Math.min(matchN,OPPONENTS.length-1)];
  p1=makeFighter(W*0.3, 1, true, opp);
  p2=makeFighter(W*0.7,-1, false, opp);
  timer=60; roundN++;
  phase='intro'; phaseT=1.6; banner='ROUND '+roundN+' — COMBATTEZ !';
  sfxGong();
}
function newGame(){
  matchN=0; roundN=0; score=0; blood=[];
  over=false; paused=false; running=true;
  startMatch();
  overlay.style.display='none';
}
function showOverlay(t,s){ ovTitle.textContent=t; overlay.querySelector('p:nth-of-type(1)').textContent=s; overlay.style.display='flex'; }

// ── entrées ──
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase(); keys[k]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  if(paused && k!=='p'){ paused=false; return; }
  if((k===' '||k==='enter') && (!running||over)){ newGame(); return; }
  if(k==='p' && running && !over){ paused=!paused; return; }
  if(!running||over||paused||phase!=='fight') return;
  if(k==='x') attack(p1,'punch');
  if(k==='c') attack(p1,'kick');
});
document.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });
overlay.addEventListener('click',()=>{ if(!running||over) newGame(); });
cv.addEventListener('touchstart',e=>{ e.preventDefault(); if(!running||over) newGame(); },{passive:false});

function attack(f,type){
  if(f.atkT>0||f.hitT>0||f.blocking) return;
  f.atkType=type; f.atkT=type==='punch'?0.3:0.46; f.atkHit=false;
}

// ── mise à jour ──
function update(dt){
  if(!running||paused||over) return;

  if(phase==='intro'){ phaseT-=dt; if(phaseT<=0){ phase='fight'; banner=''; } updGravity(p1,dt); updGravity(p2,dt); return; }
  if(phase==='roundend'||phase==='finish'){ phaseT-=dt; updGravity(p1,dt); updGravity(p2,dt); updBlood(dt);
    if(phaseT<=0) nextPhase(); return; }
  if(phase!=='fight') return;

  timer-=dt;
  if(timer<=0){ timer=0; endRound(p1.hp>=p2.hp ? p1 : p2); return; }

  // ── joueur ──
  const f=p1;
  f.blocking = !!keys['s'] && f.atkT<=0 && f.y===0;
  f.crouch = !!(keys['arrowdown']) && f.y===0;
  if(f.hitT>0) f.hitT-=dt;
  else if(!f.blocking && !f.crouch && f.atkT<=0 && f.y===0){
    if(keys['arrowleft']){ f.x-=170*dt; f.walk+=dt*9; }
    else if(keys['arrowright']){ f.x+=170*dt; f.walk+=dt*9; }
    if(keys['arrowup']){ f.vy=-440; f.y=-1; }
  }
  // ── IA ──
  const c=p2, opp=OPPONENTS[Math.min(matchN,OPPONENTS.length-1)];
  const dx=p1.x-c.x, adx=Math.abs(dx);
  if(c.hitT>0) c.hitT-=dt;
  else {
    c.cpuT-=dt;
    if(c.cpuT<=0){
      c.cpuT=0.28/opp.ai + Math.random()*0.3;
      c.blocking=false;
      const inRange=adx<58;
      const r=Math.random();
      if(inRange){
        if(r<0.36*Math.min(1,opp.ai*0.7)) attack(c, Math.random()<0.5?'punch':'kick');
        else if(r<0.55) c.blocking=true;
        else if(r<0.7 && c.y===0){ c.vy=-420; c.y=-1; }
        else c.moveDir=Math.sign(-dx);
      } else {
        c.moveDir=Math.sign(dx);
        if(r<0.12 && c.y===0){ c.vy=-420; c.y=-1; }
      }
    }
    if(!c.blocking && c.atkT<=0 && c.moveDir && c.y===0){ c.x+=c.moveDir*(120+opp.ai*22)*dt; c.walk+=dt*8; }
  }

  // orientation + limites
  p1.face = p1.x<=p2.x?1:-1; p2.face=-p1.face;
  p1.x=clamp(p1.x,26,W-26); p2.x=clamp(p2.x,26,W-26);
  if(Math.abs(p1.x-p2.x)<26){ const mid=(p1.x+p2.x)/2; p1.x=mid-13*p1.face*-1-13*0; p1.x=mid-13*Math.sign(p2.x-p1.x); p2.x=mid+13*Math.sign(p2.x-p1.x); }

  updGravity(p1,dt); updGravity(p2,dt);
  updAttack(p1,p2,dt); updAttack(p2,p1,dt);
  updBlood(dt);
}
function updGravity(f,dt){
  if(f.y!==0||f.vy!==0){ f.vy+=1300*dt; f.y+=f.vy*dt; if(f.y>=0){ f.y=0; f.vy=0; } }
}
function updAttack(f,o,dt){
  if(f.atkT<=0) return;
  f.atkT-=dt;
  const type=f.atkType;
  const total=type==='punch'?0.3:0.46;
  const t=1-f.atkT/total;
  // fenêtre active au milieu du geste
  if(!f.atkHit && t>0.3 && t<0.65){
    const reach=type==='punch'?46:56;
    const fy=f.y, oy=o.y;
    const jumpKick=f.y<0;
    if(Math.abs((f.x+f.face*reach*0.6)-(o.x))<reach*0.55 && Math.abs(fy-oy)<60){
      f.atkHit=true;
      if(o.blocking && o.y===0){
        o.hp=Math.max(0,o.hp-1); o.x+=f.face*10; sfxBlock();
        sparks(o.x-f.face*8, GROUND-58, '#9fd6ff');
      } else {
        const dmg = jumpKick?13 : type==='punch'?6:10;
        o.hp=Math.max(0,o.hp-dmg); o.hitT=0.38; o.x+=f.face*(type==='punch'?14:22);
        if(f.isP1) score+=dmg*10;
        sfxHit(type!=='punch');
        sparks(o.x-f.face*6, GROUND-64, '#e02020', true);
        if(o.hp<=0) endRound(f);
      }
    }
  }
}
function sparks(x,y,col,isBlood){
  for(let i=0;i<10;i++){ const a=Math.random()*Math.PI*2, s=60+Math.random()*160;
    blood.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-60,life:0.5+Math.random()*0.4,col}); }
}
function updBlood(dt){
  blood.forEach(b=>{ b.x+=b.vx*dt; b.y+=b.vy*dt; b.vy+=700*dt; b.life-=dt;
    if(b.y>GROUND){ b.y=GROUND; b.vy=0; b.vx*=0.8; } });
  blood=blood.filter(b=>b.life>0);
}
function endRound(winner){
  if(phase!=='fight') return;
  const loser=winner===p1?p2:p1;
  if(loser.hp<=0){ phase='finish'; banner='ACHÈVE-LE !'; phaseT=1.4; }
  else { phase='roundend'; banner='K.O. !'; phaseT=1.6; }
  if(winner===p1){ wins1++; if(loser.hp<=0) score+=500; score+=Math.floor(timer)*10; }
  else wins2++;
  sfxGong();
}
function nextPhase(){
  if(phase==='finish'){ phase='roundend'; banner='K.O. !'; phaseT=1.2; return; }
  // fin de round
  if(wins1>=2){
    matchN++; score+=1000;
    if(matchN>=OPPONENTS.length){
      running=false; over=true;
      if(window.ArcadeHi)ArcadeHi.submit(score);
      showOverlay('★ CHAMPION DU TOURNOI ★','Tous les adversaires vaincus ! Score : '+score);
      return;
    }
    roundN=0; banner='';
    startMatch(); return;
  }
  if(wins2>=2){
    running=false; over=true;
    if(window.ArcadeHi)ArcadeHi.submit(score);
    showOverlay('DÉFAITE','Adversaire '+(matchN+1)+' · Score : '+score);
    return;
  }
  startRound();
}

// ── rendu ──
function draw(){
  drawArena();
  if(running||over){
    drawFighter(p2);
    drawFighter(p1);
    blood.forEach(b=>{ ctx.globalAlpha=Math.max(0,b.life*1.6); ctx.fillStyle=b.col;
      ctx.fillRect(b.x-1.6,b.y-1.6,3.2,3.2); });
    ctx.globalAlpha=1;
    drawHUD();
    if(banner){ ctx.textAlign='center';
      ctx.fillStyle= banner.startsWith('ACHÈVE')?'#ff3030':'#ffd23a';
      ctx.strokeStyle='#000'; ctx.lineWidth=5;
      ctx.font='bold 30px "Courier New",monospace';
      ctx.strokeText(banner,W/2,H*0.42); ctx.fillText(banner,W/2,H*0.42); }
  }
  if(paused){ ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='30px "Courier New",monospace'; ctx.fillText('PAUSE',W/2,H/2); }
}
function drawArena(){
  // ciel nocturne + lune
  const g=ctx.createLinearGradient(0,0,0,GROUND);
  g.addColorStop(0,'#0a0a1e'); g.addColorStop(1,'#2a1a30');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,GROUND);
  ctx.fillStyle='#e8e4d0'; ctx.beginPath(); ctx.arc(W*0.82,54,22,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c8c4b0'; ctx.beginPath(); ctx.arc(W*0.8,50,5,0,Math.PI*2); ctx.arc(W*0.85,60,3.4,0,Math.PI*2); ctx.fill();
  // pagodes en silhouette
  ctx.fillStyle='#12081a';
  ctx.beginPath(); ctx.moveTo(30,GROUND); ctx.lineTo(30,140); ctx.lineTo(12,150); ctx.lineTo(64,132); ctx.lineTo(96,150); ctx.lineTo(78,140); ctx.lineTo(78,GROUND); ctx.fill();
  ctx.beginPath(); ctx.moveTo(430,GROUND); ctx.lineTo(430,160); ctx.lineTo(414,170); ctx.lineTo(470,150); ctx.lineTo(524,170); ctx.lineTo(508,160); ctx.lineTo(508,GROUND); ctx.fill();
  // torches
  for(const tx of [120,W-120]){
    ctx.fillStyle='#3a2c1a'; ctx.fillRect(tx-2,GROUND-70,4,70);
    const fl=Math.sin(performance.now()/90+tx)*2;
    ctx.fillStyle='#ff9d2e'; ctx.beginPath(); ctx.ellipse(tx,GROUND-76,5,9+fl,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffd23a'; ctx.beginPath(); ctx.ellipse(tx,GROUND-73,2.6,5,0,0,Math.PI*2); ctx.fill();
  }
  // sol dallé
  ctx.fillStyle='#3a3444'; ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=1.6;
  for(let x=0;x<W;x+=46){ ctx.beginPath(); ctx.moveTo(x,GROUND); ctx.lineTo(x-14,H); ctx.stroke(); }
  ctx.fillStyle='rgba(255,255,255,.05)'; ctx.fillRect(0,GROUND,W,4);
}
function drawFighter(f){
  const x=f.x, gy=GROUND+f.y*1;                 // f.y négatif en saut
  const y=GROUND+(f.y||0);
  ctx.save(); ctx.translate(x, y); ctx.scale(f.face,1);
  // ombre au sol
  ctx.save(); ctx.translate(0, -(f.y||0)); ctx.fillStyle='rgba(0,0,0,.4)';
  ctx.beginPath(); ctx.ellipse(0,2,17,4.4,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  const crouch=f.crouch && f.y===0;
  const hh=crouch?-38:-58;                       // hauteur de tête
  const hitFlash = f.hitT>0 && Math.floor(f.hitT*20)%2;
  const body = hitFlash?'#fff':f.col, dark=hitFlash?'#ddd':f.dk;
  const t=f.atkT>0 ? 1-(f.atkT/(f.atkType==='punch'?0.3:0.46)) : 0;
  const ext = t>0.3&&t<0.7 ? 1 : t>0? 0.5 : 0;   // extension du membre
  // jambes
  const step=Math.sin(f.walk)*4;
  ctx.strokeStyle=dark; ctx.lineWidth=7; ctx.lineCap='round';
  if(f.atkType==='kick' && f.atkT>0){
    ctx.beginPath(); ctx.moveTo(0,hh+30); ctx.lineTo(-8,-6); ctx.stroke();                      // jambe d'appui
    ctx.beginPath(); ctx.moveTo(0,hh+30); ctx.lineTo(14+ext*26, hh+26+(f.y<0?8:2)); ctx.stroke(); // coup de pied
    ctx.fillStyle='#1a1a22'; ctx.fillRect(14+ext*26-2, hh+22+(f.y<0?8:2), 10,7);
  } else if(crouch){
    ctx.beginPath(); ctx.moveTo(0,hh+26); ctx.lineTo(-9,-4); ctx.moveTo(0,hh+26); ctx.lineTo(9,-4); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(0,hh+30); ctx.lineTo(-6+step,-4); ctx.moveTo(0,hh+30); ctx.lineTo(6-step,-4); ctx.stroke();
    ctx.fillStyle='#1a1a22'; ctx.fillRect(-10+step,-6,9,6); ctx.fillRect(2-step,-6,9,6);
  }
  // torse
  ctx.fillStyle=body; ctx.beginPath();
  ctx.moveTo(-9,hh+10); ctx.lineTo(9,hh+10); ctx.lineTo(7,hh+34); ctx.lineTo(-7,hh+34); ctx.closePath(); ctx.fill();
  ctx.fillStyle=dark; ctx.fillRect(-8,hh+28,16,5);                        // ceinture
  ctx.fillStyle='rgba(255,255,255,.14)'; ctx.fillRect(-9,hh+10,5,22);     // reflet
  // bras
  ctx.strokeStyle=body; ctx.lineWidth=6;
  if(f.blocking){
    ctx.beginPath(); ctx.moveTo(4,hh+14); ctx.lineTo(13,hh+4); ctx.moveTo(4,hh+22); ctx.lineTo(14,hh+12); ctx.stroke();
    ctx.strokeStyle='#9fd6ff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(16,hh+12,12,-1.1,1.1); ctx.stroke();
  } else if(f.atkType==='punch' && f.atkT>0){
    ctx.beginPath(); ctx.moveTo(4,hh+14); ctx.lineTo(12+ext*24, hh+12); ctx.stroke();           // direct
    ctx.beginPath(); ctx.moveTo(-4,hh+16); ctx.lineTo(-9,hh+24); ctx.stroke();
    ctx.fillStyle='#caa07a'; ctx.beginPath(); ctx.arc(14+ext*24,hh+12,3.4,0,Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.moveTo(4,hh+14); ctx.lineTo(11,hh+24); ctx.moveTo(-4,hh+14); ctx.lineTo(-10,hh+24); ctx.stroke();
    ctx.fillStyle='#caa07a'; ctx.beginPath(); ctx.arc(12,hh+26,3,0,Math.PI*2); ctx.arc(-11,hh+26,3,0,Math.PI*2); ctx.fill();
  }
  // tête masquée de ninja
  ctx.fillStyle=body; ctx.beginPath(); ctx.arc(0,hh,8.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#caa07a'; ctx.fillRect(-6,hh-3,12,4.6);                  // bande des yeux
  ctx.fillStyle='#111'; ctx.fillRect(1,hh-2,3,2.4);                        // œil
  ctx.fillStyle=dark; ctx.beginPath(); ctx.arc(0,hh-4,8.4,Math.PI,Math.PI*2); ctx.fill(); // capuche
  ctx.restore();
}
function drawHUD(){
  const bw=210;
  const bar=(x,hp,alignRight,name,wins)=>{
    ctx.fillStyle='#000'; ctx.fillRect(x-2,10,bw+4,18);
    ctx.fillStyle='#5a1a1a'; ctx.fillRect(x,12,bw,14);
    ctx.fillStyle=hp>30?'#3adc5a':'#ffd23a';
    const w=bw*hp/100;
    ctx.fillRect(alignRight? x+bw-w : x, 12, w, 14);
    ctx.fillStyle='#fff'; ctx.font='bold 10px "Courier New",monospace';
    ctx.textAlign=alignRight?'right':'left';
    ctx.fillText(name, alignRight? x+bw : x, 38);
    ctx.fillStyle='#ffd23a';
    ctx.fillText('●'.repeat(wins)||'', alignRight? x+bw : x, 49);
  };
  const opp=OPPONENTS[Math.min(matchN,OPPONENTS.length-1)];
  bar(14, p1.hp, false, 'KOMBATTANT', wins1);
  bar(W-14-210, p2.hp, true, opp.name, wins2);
  ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='bold 20px "Courier New",monospace';
  ctx.fillText(Math.ceil(timer), W/2, 26);
  ctx.font='bold 10px "Courier New",monospace'; ctx.fillStyle='#9cf';
  ctx.fillText('SCORE '+score, W/2, 40);
}

function loop(now){
  const dt=Math.min(0.05,(now-(last||now))/1000); last=now;
  update(dt); draw();
  if(window.ArcadeHi && running) ArcadeHi.submit(score);
  requestAnimationFrame(loop);
}
matchN=0; roundN=0; score=0; wins1=0; wins2=0; timer=60; blood=[];
p1=makeFighter(W*0.3,1,true,OPPONENTS[0]); p2=makeFighter(W*0.7,-1,false,OPPONENTS[0]);
requestAnimationFrame(loop);
</script>
<script src="../music/playlist.js?v=3"></script>
<script src="../music/player.js?v=3"></script>
</body>
