<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#000;color:#fff;
    font-family:'Courier New',monospace;display:flex;flex-direction:column;
    align-items:center;justify-content:center;user-select:none;overflow:hidden}
  h1{letter-spacing:6px;margin:0 0 10px;font-size:22px;
     text-shadow:0 0 8px #fff,0 0 18px #4ecca3}
  #wrap{position:relative}
  canvas{background:#000;border:2px solid #fff;display:block;
    box-shadow:0 0 24px rgba(78,204,163,.35);touch-action:none}
  #hint{color:#777;font-size:12px;margin-top:10px;text-align:center;line-height:1.6}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:rgba(0,0,0,.78);
    text-align:center;cursor:pointer}
  #overlay h2{font-size:26px;letter-spacing:3px;margin:0 0 12px}
  #overlay p{color:#bbb;font-size:14px;margin:4px 0}
  .blink{animation:blink 1.1s steps(2,start) infinite}
  @keyframes blink{50%{opacity:0}}
  a.back{color:#4ecca3;font-size:12px;margin-top:8px;text-decoration:none;letter-spacing:1px}
  a.back:hover{text-decoration:underline}
</style>
</head>
<body>
  <h1>P O N G</h1>
  <div id="wrap">
    <canvas id="game" width="700" height="440"></canvas>
    <div id="overlay">
      <h2 id="ovTitle">PONG</h2>
      <p>Premier à <b>7</b> points gagne</p>
      <p>Souris ou ↑ / ↓ (ou W / S)</p>
      <p class="blink" style="margin-top:14px">▶ Cliquez ou Espace pour jouer</p>
    </div>
  </div>
  <div id="hint">Joueur (gauche) vs Ordinateur (droite) · P = pause</div>
  <a class="back" href="../index.html">← Menu Arcade</a>

<script>
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ovTitle');

const WIN = 7;
const PADDLE_W = 12, PADDLE_H = 80, PADDLE_SPEED = 7;
const player = { x: 18,        y: H/2 - PADDLE_H/2, score: 0 };
const cpu    = { x: W-18-PADDLE_W, y: H/2 - PADDLE_H/2, score: 0 };
const ball   = { x: W/2, y: H/2, r: 8, vx: 0, vy: 0, speed: 6 };

let running = false;      // balle en mouvement
let paused = false;
let over = false;
const keys = {};

function resetBall(dir){
  ball.x = W/2; ball.y = H/2;
  ball.speed = 6;
  const angle = (Math.random()*0.5 - 0.25) * Math.PI; // -45°..45°
  ball.vx = dir * ball.speed * Math.cos(angle);
  ball.vy = ball.speed * Math.sin(angle);
}

function newGame(){
  player.score = 0; cpu.score = 0;
  player.y = cpu.y = H/2 - PADDLE_H/2;
  over = false; paused = false;
  resetBall(Math.random() < 0.5 ? -1 : 1);
  running = true;
  hideOverlay();
}

function showOverlay(title, sub){
  ovTitle.textContent = title;
  overlay.style.display = 'flex';
  overlay.querySelector('p:nth-of-type(1)').innerHTML = sub || 'Premier à <b>7</b> points gagne';
}
function hideOverlay(){ overlay.style.display = 'none'; }

// ---- entrées ----
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (paused && ['arrowup','arrowdown','w','s'].includes(e.key.toLowerCase())){ paused = false; }
  if (e.key === ' '){ e.preventDefault(); onAction(); }
  if (e.key.toLowerCase() === 'p' && running && !over){ paused = !paused; }
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// souris
cv.addEventListener('mousemove', e => {
  const rect = cv.getBoundingClientRect();
  const my = (e.clientY - rect.top) * (H / rect.height);
  player.y = clamp(my - PADDLE_H/2, 0, H - PADDLE_H);
});
// tactile
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = cv.getBoundingClientRect();
  const my = (e.touches[0].clientY - rect.top) * (H / rect.height);
  player.y = clamp(my - PADDLE_H/2, 0, H - PADDLE_H);
}, {passive:false});

overlay.addEventListener('click', onAction);

function onAction(){
  if (!running || over){ newGame(); }
  else { paused = false; }
}

function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

// ---- logique ----
function update(){
  if (!running || paused || over) return;

  // clavier joueur
  if (keys['arrowup'] || keys['w']) player.y -= PADDLE_SPEED;
  if (keys['arrowdown'] || keys['s']) player.y += PADDLE_SPEED;
  player.y = clamp(player.y, 0, H - PADDLE_H);

  // IA : suit la balle avec une vitesse limitée (imparfaite)
  const target = ball.y - PADDLE_H/2;
  const diff = target - cpu.y;
  const cpuSpeed = 5.4;
  cpu.y += clamp(diff, -cpuSpeed, cpuSpeed);
  cpu.y = clamp(cpu.y, 0, H - PADDLE_H);

  // balle
  ball.x += ball.vx;
  ball.y += ball.vy;

  // murs haut/bas
  if (ball.y - ball.r < 0){ ball.y = ball.r; ball.vy *= -1; }
  if (ball.y + ball.r > H){ ball.y = H - ball.r; ball.vy *= -1; }

  // raquette joueur
  if (ball.vx < 0 && ball.x - ball.r < player.x + PADDLE_W &&
      ball.x - ball.r > player.x &&
      ball.y > player.y && ball.y < player.y + PADDLE_H){
    bounce(player);
  }
  // raquette cpu
  if (ball.vx > 0 && ball.x + ball.r > cpu.x &&
      ball.x + ball.r < cpu.x + PADDLE_W &&
      ball.y > cpu.y && ball.y < cpu.y + PADDLE_H){
    bounce(cpu);
  }

  // points
  if (ball.x < -20){ cpu.score++; point(1); }
  else if (ball.x > W + 20){ player.score++; point(-1); }
}

function bounce(p){
  // angle selon le point d'impact
  const rel = (ball.y - (p.y + PADDLE_H/2)) / (PADDLE_H/2); // -1..1
  const maxAngle = Math.PI * 0.42;
  const angle = rel * maxAngle;
  ball.speed = Math.min(ball.speed + 0.4, 13);
  const dir = (p === player) ? 1 : -1;
  ball.vx = dir * ball.speed * Math.cos(angle);
  ball.vy = ball.speed * Math.sin(angle);
  // évite que la balle reste collée
  ball.x = (p === player) ? p.x + PADDLE_W + ball.r : p.x - ball.r;
}

function point(dir){
  if (player.score >= WIN || cpu.score >= WIN){
    over = true; running = false;
    const win = player.score > cpu.score;
    showOverlay(win ? 'GAGNÉ ! 🏆' : 'PERDU…',
      win ? 'Vous avez battu l\'ordinateur !' : 'L\'ordinateur l\'emporte.');
    return;
  }
  resetBall(dir);
}

// ---- rendu ----
function draw(){
  ctx.clearRect(0,0,W,H);

  // filet pointillé
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.setLineDash([10, 14]);
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.setLineDash([]);

  // scores
  ctx.fillStyle = '#fff';
  ctx.font = '46px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(player.score, W/2 - 60, 56);
  ctx.fillText(cpu.score,    W/2 + 60, 56);

  // raquettes
  ctx.fillStyle = '#4ecca3';
  roundRect(player.x, player.y, PADDLE_W, PADDLE_H, 4);
  ctx.fillStyle = '#ff2e88';
  roundRect(cpu.x, cpu.y, PADDLE_W, PADDLE_H, 4);

  // balle
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();

  // pause
  if (paused && running && !over){
    ctx.fillStyle = 'rgba(0,0,0,.55)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff';
    ctx.font = '30px "Courier New", monospace';
    ctx.fillText('PAUSE', W/2, H/2);
    ctx.font = '14px "Courier New", monospace';
    ctx.fillText('P pour reprendre', W/2, H/2 + 28);
  }
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.fill();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
<script src="../music/playlist.js"></script>
<script src="../music/player.js"></script>
</body>
</html>
